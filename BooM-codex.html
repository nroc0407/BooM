  // [최적화] slice() 대신 전역 버퍼에 복사 후 정렬 — 매 프레임 새 배열 생성 방지
  _activeSpritesSorted.length = _spriteCount;
  for (let i = 0; i < _spriteCount; i++) _activeSpritesSorted[i] = _spritesPool[i];
  _activeSpritesSorted.sort((a,b) => b.dist - a.dist);

  _activeSpritesSorted.forEach(({ type, obj, dist }) => {
    // [이 아래부터는 기존 renderSprites 내부 로직과 완전히 동일합니다]
    const dx=obj.x-player.x, dy=obj.y-player.y;
    let sa = Math.atan2(dy,dx) - player.angle;
    while (sa >  Math.PI) sa -= Math.PI*2; while (sa < -Math.PI) sa += Math.PI*2;
    if (Math.abs(sa) > HALF_FOV+0.3 || dist < 0.5) return;
    const corrected = dist * Math.cos(sa);
    const spriteH = Math.floor((SCREEN_H/corrected)*0.85); const screenX = Math.floor(((sa/FOV)+0.5)*SCREEN_W);
    const spriteTop = Math.floor((SCREEN_H-spriteH)/2 + bobY); const halfW = Math.floor(spriteH*0.5);
    
    if (type === 'particle') {
      // [핵심 최적화] 파티클은 renderParticles3D()에서 별도 처리 — 이 블록 도달 불가
      return;
    }

    //---/// 적 총알 렌더링 — 반사탄은 흰/청색, 일반탄은 보라 플라즈마 ///---
    if (type === 'aoe') {
      const ri = Math.min(NUM_RAYS-1, Math.max(0, Math.round(screenX * NUM_RAYS / SCREEN_W)));
      if (corrected < zBuffer[ri]) {
        const a = obj;
        const chargeTime = a.maxLife - 0.2;
        const elapsed = a.maxLife - Math.max(0.2, a.life);
        const progress = Math.min(1, Math.max(0, elapsed / chargeTime));

        const y = spriteTop + spriteH; // 바닥 위치
        const aoeScreenR = Math.floor((SCREEN_H / corrected) * a.r * 0.5);

        ctx.save();
        ctx.translate(screenX, y);
        ctx.globalCompositeOperation = 'screen';

        if (!a.triggered) {
          // 외곽 원
          ctx.beginPath();
          if (ctx.ellipse) ctx.ellipse(0, 0, aoeScreenR, aoeScreenR * 0.35, 0, 0, Math.PI * 2);
          else ctx.arc(0, 0, aoeScreenR, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(255, 0, 30, ${0.4 + progress * 0.5})`;
          ctx.lineWidth = 2 + progress * 2;
          ctx.stroke();

          // 역오망성 (progress에 따라 서서히 회전하며 등장)
          ctx.globalAlpha = progress;
          ctx.beginPath();
          for (let i = 0; i <= 5; i++) {
            const ang = (i * Math.PI * 0.8) + (progress * Math.PI) - Math.PI / 2;
            const nx = Math.cos(ang) * aoeScreenR;
            const ny = Math.sin(ang) * aoeScreenR * 0.35;
            if (i === 0) ctx.moveTo(nx, ny); else ctx.lineTo(nx, ny);
          }
          ctx.strokeStyle = `rgba(255, 50, 0, 0.9)`;
          ctx.lineWidth = 2;
          ctx.stroke();

          // 내부 채움 (차오름)
          if (progress > 0) {
            ctx.beginPath();
            if (ctx.ellipse) ctx.ellipse(0, 0, aoeScreenR * progress, aoeScreenR * 0.35 * progress, 0, 0, Math.PI * 2);
            else ctx.arc(0, 0, aoeScreenR * progress, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(180, 0, 0, ${progress * 0.25})`;
            ctx.globalAlpha = 1;
            ctx.fill();
          }
        } else {
          // 폭발 잔상
          ctx.globalAlpha = a.life / 0.2;
          ctx.beginPath();
          if (ctx.ellipse) ctx.ellipse(0, 0, aoeScreenR, aoeScreenR * 0.35, 0, 0, Math.PI * 2);
          else ctx.arc(0, 0, aoeScreenR, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 50, 0, 0.8)`;
          ctx.fill();
        }
        ctx.restore();
      }
      return;
    }

    if (type === 'ebullet') {
      const ri = Math.min(NUM_RAYS-1, Math.max(0, Math.round(screenX * NUM_RAYS / SCREEN_W)));
      if (corrected < zBuffer[ri]) {
        const isSlash = obj.isSlash;
        const sz = Math.max(6, spriteH * (isSlash ? 0.35 : 0.14)); // 검기는 더 크게
        const by2 = spriteTop + spriteH * 0.5;
        const isRef = obj.reflected;
        ctx.save();
        
        if (isSlash) {
          // 검기 렌더링 (붉은 반월형 느낌으로 세로 압축)
          ctx.translate(screenX, by2);
          ctx.scale(0.3, 1.0); 
          ctx.beginPath(); ctx.arc(0, 0, sz, 0, Math.PI * 2);
          ctx.fillStyle = isRef ? 'rgba(100,200,255,0.9)' : 'rgba(255,40,40,0.9)';
          ctx.shadowBlur = 20; ctx.shadowColor = isRef ? '#0af' : '#f00';
          ctx.fill();
        } else {
          // 일반 총알 (보라색 플라즈마)
          const grd = ctx.createRadialGradient(screenX, by2, 0, screenX, by2, sz * 2.2);
          if (isRef) {
            grd.addColorStop(0,   'rgba(180,220,255,0.95)');
            grd.addColorStop(0.4, 'rgba(60,160,255,0.55)');
            grd.addColorStop(1,   'rgba(0,80,200,0)');
          } else {
            grd.addColorStop(0,   'rgba(255,220,255,0.95)');
            grd.addColorStop(0.35,'rgba(200,80,255,0.70)');
            grd.addColorStop(1,   'rgba(80,0,160,0)');
          }
          ctx.beginPath(); ctx.arc(screenX, by2, sz * 2.2, 0, Math.PI * 2);
          ctx.fillStyle = grd; ctx.fill();
          ctx.beginPath(); ctx.arc(screenX, by2, sz * 0.55, 0, Math.PI * 2);
          ctx.fillStyle = isRef ? '#e0f4ff' : '#f0d0ff'; ctx.fill();
        }
        ctx.restore();
      }
      return;
    }

    ctx.save(); ctx.beginPath();
    let clipHalfW = halfW;
    if (type === 'enemy') {
      clipHalfW = Math.floor(halfW * 1.5); 
      if (obj.isBoss) clipHalfW = Math.floor(halfW * 2.5); 
      if (obj.isMerchant) clipHalfW = Math.floor(halfW * 7.0); 
      // [NEW] 포탈 이펙트가 화면 모서리에서 잘리지 않도록 확장
      if (obj.isUnholyPortal) clipHalfW = Math.floor(halfW * 4.0); 
      if (obj.expansionBombTimer > 0) clipHalfW = Math.floor(halfW * 3.5); 
      if (obj.isBrute) clipHalfW = Math.floor(halfW * 2.0);   // BRUTE: 어깨 스파이크
      if (obj.isScreamer && obj._summonWave > 0) clipHalfW = Math.floor(halfW * 4.0); // 외침 파동
    } else if (type === 'portal') {
      clipHalfW = Math.floor(halfW * 2.0);
    } else if (type === 'soul') {
      clipHalfW = Math.floor(halfW * 3.5);
    }

    ctx.save(); ctx.beginPath();
    let visible = false;
    let startX = -1;
    
    // 넓어진 clipHalfW를 기반으로 픽셀을 그립니다.
    const startPx = Math.max(0, screenX - clipHalfW);
    const endPx = Math.min(SCREEN_W, screenX + clipHalfW);
    for (let px = startPx; px <= endPx; px++) {
      const ri = Math.min(NUM_RAYS - 1, Math.max(0, Math.round(px * NUM_RAYS / SCREEN_W)));
      const isVis = (px < SCREEN_W && corrected < zBuffer[ri]);
      
      if (isVis) {
        if (startX === -1) startX = px; 
        visible = true;
      } else {
        if (startX !== -1) { 
          ctx.rect(startX, 0, px - startX, SCREEN_H);
          startX = -1;
        }
      }
    }
    
    // 루프가 끝난 뒤 남은 사각형 마저 그리기
    if (startX !== -1) {
      ctx.rect(startX, 0, endPx + 1 - startX, SCREEN_H);
    }

    if (!visible) { ctx.restore(); return; }
    ctx.clip(); ctx.globalAlpha = 1.0;
    
    if (type === 'soul') {
      const s = obj;
      const p = 1 - (s.life / s.maxLife);

      const drawY = spriteTop + spriteH;
      const pillarW = halfW * 2.5;
      const pillarH = SCREEN_H;
      const alpha = p < 0.2 ? p / 0.2 : (p > 0.8 ? (1 - p) / 0.2 : 1);

      ctx.save();
      ctx.translate(screenX, drawY);
      ctx.globalAlpha = alpha;
      ctx.globalCompositeOperation = 'source-over';

      // 원혼 파편 — 기둥 폭 안에서 위로 승천
      for (let i = 0; i < 12; i++) {
        const upwardY = (p * pillarH * 2.5 + i * 40) % pillarH;
        const px = (Math.random() - 0.5) * pillarW * 0.6;
        const py = -upwardY;
        const size = Math.max(3, halfW * 0.15 * Math.random());
        ctx.fillStyle = Math.random() < 0.3 ? '#000000' : 'rgba(50, 0, 0, 0.9)';
        ctx.fillRect(px, py, size, size * (4 + Math.random() * 6));
      }

      ctx.restore();
    } else if (type === 'portal') {
      // (기존 포탈 코드 그대로 유지...)
      const spawnP = (obj.spawning && !obj.active) ? (obj.spawnProgress || 0) : 1.0;
      const sz = Math.max(10, Math.floor(SCREEN_H / corrected * 0.28));
      const cx = screenX, cy = Math.floor(SCREEN_H * 0.5);
      const rotSpeeds = [1.7, -1.1, 2.3, -0.8];
      const rotOffsets = [0, Math.PI * 0.25, Math.PI * 0.5, Math.PI * 0.75];
      const ringColors = ['rgb(255,255,255)', 'rgb(220,240,255)', 'rgb(190,220,255)', 'rgb(160,200,255)'];
      ctx.save();
      ctx.globalAlpha = spawnP;
      ctx.translate(cx, cy);
      ctx.scale(spawnP, spawnP);
      for (let i = 0; i < 4; i++) {
        ctx.save(); ctx.rotate(obj.time * rotSpeeds[i] + rotOffsets[i]); ctx.beginPath();
        ctx.arc(0, 0, sz * (0.5 + i * 0.2), 0, Math.PI * 1.5);
        ctx.strokeStyle = ringColors[i]; ctx.lineWidth = Math.max(sz * 0.12, 3); ctx.stroke();
        ctx.restore();
      }
      ctx.restore();
    } else if (type === 'enemy') {
      const en = obj;
      // [NEW] 팽창 중이면 시체 렌더링 생략 (부풀어 오르고 서서 죽음)
      const dead = en.hp <= 0 && (!en.compressionTimer || en.compressionTimer <= 0) && (!en.expansionBombTimer || en.expansionBombTimer <= 0);

      if (dead) {
        const soulP = _soulEnemyMap.get(en);

        if (!en._completelyVanished) {
          if (soulP !== undefined) {
            // soul 진행 중: 원본 형상을 어둡게 tint해서 그림
            // hitAlpha를 살짝 높여 색을 탁하게, globalAlpha로 점점 어두워짐
            const fadeAlpha = soulP < 0.7
              ? 0.85 - soulP * 0.5          // 0→0.7: 0.85→0.50
              : Math.max(0, 0.5 - (soulP - 0.7) / 0.3 * 0.5); // 0.7→1.0: 0.50→0
            ctx.save();
            ctx.globalAlpha = fadeAlpha;
            drawEnemyBody(en, screenX, spriteTop, spriteH, halfW, 0);
            ctx.restore();
          }

          // 바닥 그림자
          ctx.fillStyle = soulP !== undefined ? '#1a0000' : '#3a1010';
          ctx.beginPath();
          if (ctx.ellipse) ctx.ellipse(screenX, spriteTop+spriteH*0.9, halfW*1.2, spriteH*0.1, 0, 0, Math.PI*2);
          else ctx.arc(screenX, spriteTop+spriteH*0.9, halfW*1.2, 0, Math.PI*2);
          ctx.fill();
        }
      }
      else if (en.isMerchant) {
        // [NEW] 신비로운 차원 상인 (보라색 망토 + 떠다니는 홀로그램 큐브)
        const floatY = Math.sin(Date.now() / 300) * spriteH * 0.05;
        ctx.save();
        
        // 보라색 망토
        ctx.fillStyle = '#2a004a';
        ctx.beginPath();
        ctx.moveTo(screenX, spriteTop + floatY + spriteH * 0.1);
        ctx.lineTo(screenX - halfW * 0.6, spriteTop + floatY + spriteH);
        ctx.lineTo(screenX + halfW * 0.6, spriteTop + floatY + spriteH);
        ctx.fill();
        
        // 망토 금장 테두리
        ctx.fillStyle = '#ffcc00';
        ctx.fillRect(screenX - halfW * 0.4, spriteTop + floatY + spriteH * 0.4, halfW * 0.8, spriteH * 0.03);
        
        // 푹 눌러쓴 후드 
        ctx.fillStyle = '#110022';
        ctx.beginPath();
        ctx.arc(screenX, spriteTop + floatY + spriteH * 0.25, halfW * 0.4, 0, Math.PI * 2);
        ctx.fill();
        
        // 후드 속 번뜩이는 금빛 눈
        ctx.fillStyle = '#ffcc00';
        ctx.shadowColor = '#ff8800'; ctx.shadowBlur = 12;
        ctx.fillRect(screenX - halfW * 0.15, spriteTop + floatY + spriteH * 0.25, halfW * 0.1, spriteH * 0.04);
        ctx.fillRect(screenX + halfW * 0.05, spriteTop + floatY + spriteH * 0.25, halfW * 0.1, spriteH * 0.04);
        ctx.shadowBlur = 0;

        // 옆에 떠다니는 홀로그램 상점 큐브
        const cubeY = spriteTop + floatY + spriteH * 0.45 + Math.cos(Date.now() / 150) * spriteH * 0.06;
        ctx.fillStyle = 'rgba(0, 255, 255, 0.4)';
        ctx.shadowColor = '#0ff'; ctx.shadowBlur = 15;
        ctx.fillRect(screenX - halfW * 0.8, cubeY, halfW * 0.35, halfW * 0.35);
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5;
        ctx.strokeRect(screenX - halfW * 0.8, cubeY, halfW * 0.35, halfW * 0.35);
        
        ctx.restore();

        if (en.dialogueTimer > 0) {
          ctx.save();
          ctx.font = `bold ${Math.max(12, halfW * 0.15)}px Share Tech Mono`;
          ctx.textAlign = 'center';
          ctx.fillStyle = '#00ffff';
          ctx.shadowColor = '#0055ff'; ctx.shadowBlur = 8;
          const textY = spriteTop + spriteH * 0.1 + floatY; 
          ctx.fillText(en.dialogueText, screenX, textY);
          ctx.restore();
        }
      }
      else if (en.isUnholyPortal) {
        const pScale = en.scale;
        ctx.save();
        ctx.translate(screenX, spriteTop + spriteH * 0.5); 
        ctx.scale(pScale, pScale);
        
        const pW = halfW * 3.5;
        const pH = spriteH * 1.0;
        const time = Date.now() / 150;
        const pulse = 0.8 + 0.2 * Math.sin(time);
        
        // 1. 소용돌이치는 균열 링 3겹
        ctx.globalCompositeOperation = 'screen';
        ctx.shadowBlur = 20 * pulse;
        ctx.shadowColor = '#ff0000';
        
        for (let i = 0; i < 3; i++) {
          ctx.save();
          ctx.rotate(time * (i % 2 === 0 ? 0.3 : -0.4) * (1 + i * 0.5));
          ctx.beginPath();
          if (ctx.ellipse) ctx.ellipse(0, 0, pW * (0.8 - i * 0.1), pH * 0.5, 0, 0, Math.PI * 2);
          else ctx.arc(0, 0, pH * 0.5, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(255, ${40 + i * 40}, 0, 0.7)`;
          ctx.lineWidth = 4 + i * 2;
          ctx.setLineDash([20 + i * 10, 15 + i * 5]);
          ctx.stroke();
          ctx.restore();
        }
        
        // 2. 심연 그라데이션
        ctx.globalCompositeOperation = 'source-over';
        ctx.shadowBlur = 0;
        ctx.setLineDash([]);
        const grd2 = ctx.createRadialGradient(0, 0, 0, 0, 0, pH * 0.45);
        grd2.addColorStop(0, '#000000');
        grd2.addColorStop(0.6, '#1a0000');
        grd2.addColorStop(0.8, '#880000');
        grd2.addColorStop(1, 'rgba(255,0,0,0)');
        ctx.fillStyle = grd2;
        ctx.beginPath();
        if (ctx.ellipse) ctx.ellipse(0, 0, pW * 0.75, pH * 0.45, 0, 0, Math.PI * 2);
        else ctx.arc(0, 0, pH * 0.45, 0, Math.PI * 2);
        ctx.fill();
        
        // 3. 고동치는 블랙홀 핵
        ctx.fillStyle = '#000000';
        ctx.beginPath();
        if (ctx.ellipse) ctx.ellipse(0, 0, pW * 0.5 * pulse, pH * 0.3 * pulse, 0, 0, Math.PI * 2);
        else ctx.arc(0, 0, pH * 0.3 * pulse, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.restore();
      }
      // 보스 렌더링 (보스 등 뒤의 포탈 코드는 제거됨)
      else if (en.isBoss) {
        ctx.save();
        
        // [NEW] 보스 등 뒤에 열리는 찢어진 불경한 포탈
        if (en._unholyPortal) {
          const pScale = en._unholyPortal.scale;
          ctx.save();
          ctx.translate(screenX, spriteTop + spriteH * 0.5); 
          ctx.scale(pScale, pScale);
          
          const pW = halfW * 3.5;
          const pH = spriteH * 1.0;
          const time = Date.now() / 150;
          const pulse = 0.8 + 0.2 * Math.sin(time);
          
          ctx.globalCompositeOperation = 'screen';
          ctx.shadowBlur = 20 * pulse;
          ctx.shadowColor = '#ff0000';
          
          for (let i = 0; i < 3; i++) {
            ctx.save();
            ctx.rotate(time * (i % 2 === 0 ? 0.3 : -0.4) * (1 + i * 0.5));
            ctx.beginPath();
            if (ctx.ellipse) ctx.ellipse(0, 0, pW * (0.8 - i * 0.1), pH * 0.5, 0, 0, Math.PI * 2);
            else ctx.arc(0, 0, pH * 0.5, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(255, ${40 + i * 40}, 0, 0.7)`;
            ctx.lineWidth = 4 + i * 2;
            ctx.setLineDash([20 + i * 10, 15 + i * 5]);
            ctx.stroke();
            ctx.restore();
          }
          
          ctx.globalCompositeOperation = 'source-over';
          ctx.shadowBlur = 0;
          ctx.setLineDash([]);
          const grdB = ctx.createRadialGradient(0, 0, 0, 0, 0, pH * 0.45);
          grdB.addColorStop(0, '#000000');
          grdB.addColorStop(0.6, '#1a0000');
          grdB.addColorStop(0.8, '#880000');
          grdB.addColorStop(1, 'rgba(255,0,0,0)');
          ctx.fillStyle = grdB;
          ctx.beginPath();
          if (ctx.ellipse) ctx.ellipse(0, 0, pW * 0.75, pH * 0.45, 0, 0, Math.PI * 2);
          else ctx.arc(0, 0, pH * 0.45, 0, Math.PI * 2);
          ctx.fill();
          
          ctx.fillStyle = '#000000';
          ctx.beginPath();
          if (ctx.ellipse) ctx.ellipse(0, 0, pW * 0.5 * pulse, pH * 0.3 * pulse, 0, 0, Math.PI * 2);
          else ctx.arc(0, 0, pH * 0.3 * pulse, 0, Math.PI * 2);
          ctx.fill();
          
          ctx.restore();
        }
        
        // [복구됨] 실수로 지워졌던 거대한 보스 본체 렌더링 코드
        const hitAlpha = en.hitFlash || 0;
        const invuln = en.invulnTimer > 0;
        const isP2 = en.phase >= 2;
        
        const bodyC = hitAlpha > 0 ? `rgba(255,100,100,1)` : (isP2 ? '#400' : '#611');
        const skinC = hitAlpha > 0 ? `rgba(255,200,200,1)` : (isP2 ? '#711' : '#922');
        const hornC = hitAlpha > 0 ? '#ffaa00' : '#111';
        const eyeC  = hitAlpha > 0.5 ? '#fff' : (isP2 ? '#ffaa00' : '#ffdd00');
        const sc = isP2 ? 1.5 : 1.3;
        const breathe = Math.sin(Date.now() / 250) * 0.06;

        ctx.fillStyle = isP2 ? '#200' : '#311';
        const wingSpread = isP2 ? 1.8 : 1.3;
        const wingFlap = Math.sin(Date.now() / 150) * 0.1 * sc;
        ctx.beginPath();
        ctx.moveTo(screenX, spriteTop + spriteH*(1 - 0.6*sc));
        ctx.lineTo(screenX - halfW*wingSpread*sc, spriteTop + spriteH*(1 - 1.0*sc) + spriteH*wingFlap);
        ctx.lineTo(screenX - halfW*0.6*sc, spriteTop + spriteH*(1 - 0.3*sc));
        ctx.moveTo(screenX, spriteTop + spriteH*(1 - 0.6*sc));
        ctx.lineTo(screenX + halfW*wingSpread*sc, spriteTop + spriteH*(1 - 1.0*sc) + spriteH*wingFlap);
        ctx.lineTo(screenX + halfW*0.6*sc, spriteTop + spriteH*(1 - 0.3*sc));
        ctx.fill();

        ctx.strokeStyle = hornC;
        ctx.lineWidth = halfW * 0.25 * sc;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(screenX - halfW*0.2*sc, spriteTop + spriteH*(1 - 0.9*sc) - spriteH*breathe);
        ctx.quadraticCurveTo(screenX - halfW*0.8*sc, spriteTop + spriteH*(1 - 1.2*sc) - spriteH*breathe, screenX - halfW*1.0*sc, spriteTop + spriteH*(1 - 0.8*sc) - spriteH*breathe);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(screenX + halfW*0.2*sc, spriteTop + spriteH*(1 - 0.9*sc) - spriteH*breathe);
        ctx.quadraticCurveTo(screenX + halfW*0.8*sc, spriteTop + spriteH*(1 - 1.2*sc) - spriteH*breathe, screenX + halfW*1.0*sc, spriteTop + spriteH*(1 - 0.8*sc) - spriteH*breathe);
        ctx.stroke();

        ctx.fillStyle = bodyC;
        ctx.fillRect(screenX - halfW*0.7*sc, spriteTop + spriteH*(1 - 0.7*sc) - spriteH*breathe, halfW*1.4*sc, spriteH*0.45*sc);
        ctx.fillStyle = skinC; 
        ctx.fillRect(screenX - halfW*0.5*sc, spriteTop + spriteH*(1 - 0.65*sc) - spriteH*breathe, halfW*0.4*sc, spriteH*0.2*sc);
        ctx.fillRect(screenX + halfW*0.1*sc, spriteTop + spriteH*(1 - 0.65*sc) - spriteH*breathe, halfW*0.4*sc, spriteH*0.2*sc);

        ctx.fillStyle = skinC;
        ctx.fillRect(screenX - halfW*0.4*sc, spriteTop + spriteH*(1 - 0.95*sc) - spriteH*breathe, halfW*0.8*sc, spriteH*0.3*sc);

        ctx.fillStyle = eyeC;
        const eyeY = spriteTop + spriteH*(1 - 0.82*sc) - spriteH*breathe;
        ctx.beginPath();
        ctx.moveTo(screenX - halfW*0.3*sc, eyeY - spriteH*0.02);
        ctx.lineTo(screenX - halfW*0.05*sc, eyeY + spriteH*0.04);
        ctx.lineTo(screenX - halfW*0.2*sc, eyeY + spriteH*0.06);
        ctx.fill();
        ctx.beginPath(); 
        ctx.moveTo(screenX + halfW*0.3*sc, eyeY - spriteH*0.02);
        ctx.lineTo(screenX + halfW*0.05*sc, eyeY + spriteH*0.04);
        ctx.lineTo(screenX + halfW*0.2*sc, eyeY + spriteH*0.06);
        ctx.fill();

        ctx.fillStyle = '#111';
        ctx.beginPath();
        ctx.moveTo(screenX - halfW*0.5*sc, spriteTop + spriteH*(1 - 0.25*sc) - spriteH*breathe);
        ctx.lineTo(screenX + halfW*0.5*sc, spriteTop + spriteH*(1 - 0.25*sc) - spriteH*breathe);
        ctx.lineTo(screenX + halfW*0.3*sc, spriteTop + spriteH);
        ctx.lineTo(screenX - halfW*0.3*sc, spriteTop + spriteH);
        ctx.fill();

        if (invuln) { 
          const shimmer = 0.25 + Math.abs(Math.sin(Date.now()/120)) * 0.4;
          ctx.fillStyle = `rgba(255,80,0,${shimmer})`; 
          ctx.fillRect(screenX - halfW*1.5*sc, spriteTop + spriteH*(1 - 1.2*sc), halfW*3*sc, spriteH*1.2*sc); 
        }
        
        ctx.restore();

        const topOffset = isP2 ? spriteH * 0.8 : spriteH * 0.4;
        const barY = spriteTop - topOffset - 25;

        const hpPct = en.hp/en.maxHp;
        ctx.fillStyle='#000'; ctx.fillRect(screenX-halfW*1.2, barY, halfW*2.4, 8);
        const barColor = hpPct > 0.6 ? '#dd0000' : hpPct > 0.3 ? '#ff6600' : '#ff0000';
        ctx.fillStyle = barColor; ctx.fillRect(screenX-halfW*1.2, barY, halfW*2.4*hpPct, 8);
        ctx.strokeStyle='#800'; ctx.lineWidth=1; ctx.strokeRect(screenX-halfW*1.2, barY, halfW*2.4, 8);
        if (invuln) { ctx.fillStyle=`rgba(255,80,0,${0.4+Math.sin(Date.now()/100)*0.3})`; ctx.fillRect(screenX-halfW*1.2, barY, halfW*2.4, 8); }
        ctx.fillStyle = '#fff'; ctx.font = `bold ${Math.max(9,halfW*0.18)}px Share Tech Mono`; ctx.textAlign='center';
        ctx.fillText(`PHASE ${en.phase}${invuln?' [INVULN]':''}`, screenX, barY - 8);
      }
      // [복구됨] 일반 몬스터 처리를 위한 else 블록 복원!
      else {
        const hitAlpha = en.hitFlash || 0;
        let scaleX = 1, scaleY = 1;
        
        // 팽창 애니메이션 (크게 부풀어오르며 진동함)
        if (en.expansionBombTimer > 0) {
          const t = 1 - (en.expansionBombTimer / 0.45);
          const swell = 1 + t * t * 1.6;
          scaleX *= swell + Math.sin(t * Math.PI * 10) * 0.15;
          scaleY *= swell - Math.sin(t * Math.PI * 10) * 0.15;
        }

        if (en.compressionTimer > 0) {
          const t = en.compressionTimer / 0.55; 
          scaleY *= Math.max(0.01, t * t * t); 
          scaleX *= Math.max(0.01, t * t);
          if (t > 0.1) {
            scaleX += (Math.random() - 0.5) * 0.2;
            scaleY += (Math.random() - 0.5) * 0.1;
          }
        }
        
        const anchorY = spriteTop + spriteH; 
        ctx.save();
        ctx.transform(scaleX, 0, 0, scaleY, screenX * (1 - scaleX), anchorY * (1 - scaleY));
        drawEnemyBody(en, screenX, spriteTop, spriteH, halfW, hitAlpha);
        
        if (en.stunTimer > 0)  { ctx.fillStyle=`rgba(255,230,0,0.35)`; ctx.fillRect(screenX-halfW*0.75, spriteTop+spriteH*0.08, halfW*1.5, spriteH*0.88); }
        if (en.frozenTimer > 0){ ctx.fillStyle=`rgba(100,200,255,0.40)`; ctx.fillRect(screenX-halfW*0.75, spriteTop+spriteH*0.08, halfW*1.5, spriteH*0.88); }
        if (en.burnTimer > 0)  {
          const flicker = 0.25 + Math.random() * 0.25;
          ctx.fillStyle=`rgba(255,${80+Math.floor(Math.random()*60)},0,${flicker})`;
          ctx.fillRect(screenX-halfW*0.75, spriteTop+spriteH*0.08, halfW*1.5, spriteH*0.88);
        }
        if (en.compressionTimer > 0) {
          const gAlpha = Math.min(1, en.compressionTimer / 0.55) * 0.45;
          ctx.fillStyle = `rgba(180,0,255,${gAlpha})`;
          ctx.fillRect(screenX-halfW*0.75, spriteTop+spriteH*0.08, halfW*1.5, spriteH*0.88);
        }
        if (en.expansionBombTimer > 0) {
          const gAlpha = Math.min(1, 1 - en.expansionBombTimer / 0.45);
          ctx.fillStyle = `rgba(180, 0, 255, ${gAlpha * 0.8})`;
          ctx.fillRect(screenX-halfW*0.75, spriteTop+spriteH*0.08, halfW*1.5, spriteH*0.88);
        }
        
        ctx.restore();

        if (dist < 8) {
          const hpPct=en.hp/en.maxHp; 
          ctx.fillStyle='#000'; ctx.fillRect(screenX-halfW, spriteTop-8, halfW*2, 5);
          ctx.fillStyle=`hsl(${hpPct*120},90%,45%)`; ctx.fillRect(screenX-halfW, spriteTop-8, halfW*2*hpPct, 5);

          //---/// IRONCLAD: 아머 바 (HP바 위에 파란색으로 표시) ///---
          if (en.isIronclad && en.maxArmor > 0) {
            const armPct = Math.max(0, en.armor / en.maxArmor);
            ctx.fillStyle='#000'; ctx.fillRect(screenX-halfW, spriteTop-16, halfW*2, 5);
            ctx.fillStyle=`rgba(80,160,255,0.9)`; ctx.fillRect(screenX-halfW, spriteTop-16, halfW*2*armPct, 5);
            ctx.strokeStyle='#004488'; ctx.lineWidth=1; ctx.strokeRect(screenX-halfW, spriteTop-16, halfW*2, 5);
          }

          //---/// 변종 이름 태그 ///---
          if (en.isBrute || en.isPhantom || en.isSiege || en.isScreamer || en.isIronclad) {
            const variantName = en.isBrute ? '▲ BRUTE' : en.isPhantom ? '◈ PHANTOM' : en.isSiege ? '⊕ SIEGE' : en.isScreamer ? '◉ SCREAMER' : '⬡ IRONCLAD';
            const variantColor = en.isBrute ? '#ff6622' : en.isPhantom ? '#cc66ff' : en.isSiege ? '#ff8800' : en.isScreamer ? '#ffcc00' : '#80ccff';
            ctx.save();
            ctx.font = `bold ${Math.max(8, halfW*0.16)}px Share Tech Mono`;
            ctx.textAlign = 'center';
            ctx.fillStyle = variantColor;
            ctx.shadowColor = '#000'; ctx.shadowBlur = 4;
            ctx.fillText(variantName, screenX, spriteTop - (en.isIronclad ? 20 : 14));
            ctx.shadowBlur = 0;
            ctx.restore();
          }
        }
      }
    } else if (type === 'item') {
      const it=obj, bobOffset=Math.sin(it.bob)*spriteH*0.05; const sz=spriteH*0.35, ix=screenX-sz/2, iy=spriteTop+spriteH*0.55+bobOffset;
      if (it.type === 'health') {
        ctx.fillStyle='#0a0'; ctx.fillRect(ix-2,iy-2,sz+4,sz+4); ctx.fillStyle='#0f0'; ctx.fillRect(ix,iy,sz,sz);
        ctx.fillStyle='#fff'; ctx.fillRect(ix+sz*0.4,iy+sz*0.1,sz*0.2,sz*0.8); ctx.fillRect(ix+sz*0.1,iy+sz*0.4,sz*0.8,sz*0.2);
      } else if (it.type === 'armor') {
        ctx.fillStyle='#047'; ctx.fillRect(ix-2,iy-2,sz+4,sz+4); ctx.fillStyle='#0af'; ctx.fillRect(ix,iy,sz,sz);
        ctx.fillStyle='#fff'; ctx.beginPath(); ctx.moveTo(ix+sz*0.5, iy+sz*0.1); ctx.lineTo(ix+sz*0.9, iy+sz*0.35);
        ctx.lineTo(ix+sz*0.5, iy+sz*0.9); ctx.lineTo(ix+sz*0.1, iy+sz*0.35); ctx.closePath(); ctx.fill();
      } else if (it.type === 'ammo') {
        ctx.fillStyle='#880'; ctx.fillRect(ix-2,iy-2,sz+4,sz+4); ctx.fillStyle='#ff0'; ctx.fillRect(ix,iy,sz,sz);
        ctx.fillStyle='#000'; const bw = sz*0.18, bh = sz*0.55, gap = sz*0.08; const startX = ix + sz*0.12;
        for (let b = 0; b < 3; b++) ctx.fillRect(startX + b*(bw+gap), iy+sz*0.22, bw, bh);
      }
    }
    ctx.restore();
  });
}
function renderSkyStrikes() {
  if (typeof skyStrikes === 'undefined' || skyStrikes.length === 0) return;
  skyStrikes.forEach(s => {
    const dx = s.x - player.x, dy = s.y - player.y;
    let sa = Math.atan2(dy, dx) - player.angle;
    while (sa >  Math.PI) sa -= Math.PI * 2;
    while (sa < -Math.PI) sa += Math.PI * 2;
    if (Math.abs(sa) > HALF_FOV + 0.3) return; // 화면 밖이면 무시
    
    const dist = Math.hypot(dx, dy);
    if (dist < 0.1) return;
    const corrected = dist * Math.cos(sa);
    const screenX = Math.floor(((sa / FOV) + 0.5) * SCREEN_W);
    const spriteH = Math.floor((SCREEN_H / corrected) * 0.85);
    const groundY = Math.floor((SCREEN_H + spriteH) / 2); // 바닥 y좌표
    
    const alpha = Math.max(0, s.life / 0.4);
    
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    
    // 검붉은 메인 벼락 줄기 3~4개 생성
    for(let j = 0; j < 3; j++) {
       const SEG = 8 + Math.floor(Math.random() * 4);
       const pts = [{x: screenX + (Math.random()-0.5)*100, y: -50}]; // 화면 최상단 하늘
       
       for(let i=1; i<=SEG; i++) {
         const t = i / SEG;
         const baseY = -50 + (groundY + 50) * t;
         const baseX = screenX + (Math.random()-0.5)*80 * (1-t); // 바닥으로 꽂힐수록 중앙에 모임
         pts.push({x: baseX, y: baseY});
       }
       
       // 바깥쪽 붉은색 아우라
       ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
       for(let i=1; i<pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
       ctx.strokeStyle = '#ff0000';
       ctx.shadowColor = '#880000';
       ctx.shadowBlur = 20;
       ctx.lineWidth = 4 + Math.random() * 4;
       ctx.stroke();
       
       // 안쪽 흰색/노란색 코어
       ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
       for(let i=1; i<pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
       ctx.strokeStyle = Math.random() < 0.5 ? '#ffffff' : '#ffcccc';
       ctx.shadowBlur = 0;
       ctx.lineWidth = 2 + Math.random() * 2;
       ctx.stroke();
    }
    ctx.restore();
  });
}
//---/// 오리지널 기본 총기 렌더링 블록 (좌우 반전 재사용을 위한 공통 함수) ///---
function drawOriginalGunBlocks(ctx, flashAmt, topVisible) {
  // 원래 코드의 화면 중앙(bx, by)을 원점(0,0)으로 둔 오리지널 로컬 좌표
  const gx = -84, gy = -140; 
  
  if (flashAmt > 0) {
    const sz = 55 * flashAmt;
    const fx = -4, fy = -128;
    ctx.save(); 
    ctx.globalAlpha = Math.min(1, flashAmt * 1.8);
    const grd = ctx.createRadialGradient(fx, fy, 0, fx, fy, sz * 2.2);
    grd.addColorStop(0,    'rgba(255,255,220,0.95)');
    grd.addColorStop(0.35, 'rgba(255,160,0,0.70)');
    grd.addColorStop(1,    'rgba(160,60,0,0)');
    ctx.beginPath(); ctx.arc(fx, fy, sz * 2.2, 0, Math.PI * 2);
    ctx.fillStyle = grd; ctx.fill();
    ctx.beginPath(); ctx.arc(fx, fy, sz * 0.55 * 0.25, 0, Math.PI * 2);
    ctx.fillStyle = '#fffbe0'; ctx.fill();
    ctx.restore();
  }

  // 오리지널 블록 아트
  ctx.fillStyle = topVisible ? '#aaa' : '#555'; ctx.fillRect(gx+40, gy+20, 80, 80);
  ctx.fillStyle = topVisible ? '#777' : '#333'; ctx.fillRect(gx+48, gy+28, 64, 20);
  if (topVisible) { ctx.fillStyle = '#ccc'; ctx.fillRect(gx+42, gy+18, 76, 5); }
  ctx.fillStyle = '#666'; ctx.fillRect(gx+44, gy+40, 10, 50); 
  ctx.fillStyle = '#888'; ctx.fillRect(gx+54, gy+42, 60, 8);
  ctx.fillStyle = '#222'; ctx.fillRect(gx+50, gy+90, 60, 30);
  ctx.fillStyle = '#777'; ctx.fillRect(gx+44, gy+48, 8, 6); 
  ctx.fillRect(gx+44, gy+58, 8, 6); 
  ctx.fillRect(gx+44, gy+68, 8, 6);
  ctx.fillStyle = '#444'; ctx.fillRect(gx+108, gy+20, 12, 55); 
  ctx.fillStyle = '#999'; ctx.fillRect(gx+110, gy+22, 8,  4);
}

//---/// 그라마톤 클레릭: 기본총을 좌우 반전해 2개 띄우는 형식 ///---
function renderGunCleric() {
  const bob = Math.sin(player.bobPhase) * player.bobAmt * 8;
  let reloadDip = 0;
  if (gun.reloading) { 
    const prog = 1 - gun.reloadTimer / (gun.RELOAD_TIME * 1.3); 
    reloadDip = Math.sin(prog * Math.PI) * 60; 
  }
  const kick = player.kickAmt + reloadDip;
  const by = SCREEN_H - 10;

  const leftKick  = (gun._clericSide === 1) ? kick : 0;
  const rightKick = (gun._clericSide === 0) ? kick : 0;
  const t = player.meleeSwing;
  
  // 오리지널과 동일한 근접 공격 변수
  const swingPhase = t > 0.5 ? (1 - t) * 2 : t * 2;
  const maxAngle = -1.9;
  const swingAngle = maxAngle * Math.sin(swingPhase * Math.PI * 0.5);
  const swingOffX = -Math.sin(swingPhase * Math.PI * 0.5) * 55;
  const swingOffY = -Math.sin(swingPhase * Math.PI * 0.5) * 20;
  const topVisible = t > 0 && swingPhase > 0.55;

  // 전역 근접 플래시
  if (meleeFlash > 0) {
    ctx.save();
    ctx.globalAlpha = meleeFlash * 3;
    const fx = SCREEN_W / 2;
    const fy = by - 140 + bob;
    const g2 = ctx.createRadialGradient(fx, fy, 10, fx, fy, 60);
    g2.addColorStop(0, '#fff'); g2.addColorStop(0.4, '#fa0'); g2.addColorStop(1, 'transparent');
    ctx.fillStyle = g2; ctx.beginPath(); ctx.arc(fx, fy, 60, 0, Math.PI * 2); ctx.fill(); 
    ctx.restore();
  }

  // 1개의 총을 그리는 로직 (좌측일 경우 scale로 거울 반전!)
  function drawPistol(cx, isLeft, currentKick, flash) {
    ctx.save();
    ctx.translate(cx, by); // 기준 위치로 이동

    if (isLeft) {
      ctx.scale(-1, 1); // 왼쪽 총은 축을 반전
    }

    // 화면 크기에 맞게 클레릭 모드에서는 기본총 크기를 살짝 줄임
    ctx.scale(0.85, 0.85);

    // [수정] 근접 공격 시 오른쪽 총(!isLeft)만 뒤로 당기도록 조건 추가
    const isSwinging = (t > 0) && (!isLeft);

    if (isSwinging) {
      const pivotX = 120;
      const pivotY = 30;
      ctx.translate(pivotX + swingOffX, pivotY + swingOffY);
      ctx.rotate(swingAngle);
      ctx.translate(-pivotX, -pivotY);
    }

    ctx.translate(0, bob + currentKick);
    
    // [수정] 총기 상단 렌더링(topVisible)도 오른쪽 총이 스윙 중일 때만 적용
    const currentTopVisible = isSwinging && swingPhase > 0.55;
    
    drawOriginalGunBlocks(ctx, flash, currentTopVisible);
    ctx.restore();
  }

  const leftX  = SCREEN_W / 2 - 160;
  const rightX = SCREEN_W / 2 + 160;

  drawPistol(leftX,  true,  leftKick,  muzzleFlash);
  drawPistol(rightX, false, rightKick, gun._clericFlash);
}
// --- [NEW] 유러피안 바메이스 렌더링 (타격감 강화 버전 - 팍! 스윽) ---
function renderMace() {
  const cx = SCREEN_W / 2;
  const cy = SCREEN_H;
  // 걷기 반동은 그대로 유지
  const bob = Math.sin(player.bobPhase) * player.bobAmt * 8;

  ctx.save();
  ctx.shadowBlur = 0; // 최적화

  // 대기 위치 (화면 오른쪽 아래)
  let offsetX = 220;
  let offsetY = -30;
  let angle = Math.PI / 5; // 36도 기울임 (택티컬 레트로 포즈)

  // --- [핵심 수정] Easings 애니메이션 (팍! 스윽 느낌 구현) ---
  if (mace.swingTimer > 0) {
    const totalProgress = 1 - (mace.swingTimer / mace.cooldown);
    
    // 공격 지속 시간을 1.0 (100%) 기준으로 봤을 때의 스케일링
    if (totalProgress < 0.20) { 
      // 1단계: 강하게 내려치기 (0%~20% 구간, 아주 짧게 팍!)
      const t = totalProgress / 0.20; // 0 -> 1 로 정규화
      const easeT = easeOutBack(t); // 후반 감속 + 살짝 튕김 적용

      // 타격 반경을 훨씬 크게 확장 (사선 타격)
      offsetX = 220 - (easeT * 550); // 화면 왼쪽 끝까지!
      offsetY = -30 + (easeT * 250); // 아래로 크게 휘두름
      angle = Math.PI / 5 - (easeT * Math.PI * 1.5); // 한 바퀴 반 회전

    } else if (totalProgress < 0.25) {
      // 2단계: 타격 지속 프레임 (20%~25% 구간, 잠깐 멈춤)
      // 이 구간에서 실제 setTimeout 데미지 판정이 터짐
      offsetX = -330;
      offsetY = 220;
      angle = Math.PI / 5 - (Math.PI * 1.5);

    } else {
      // 3단계: 제자리로 회수 (25%~100% 구간, 천천히 스윽~)
      const t = (totalProgress - 0.25) / 0.75; // 0 -> 1 로 정규화
      const easeT = easeOutQuad(t); // 후반 부드러운 감속 적용

      // 팍! 쳤던 위치(-330)에서 대기 위치(220)로 감속하며 복귀
      offsetX = -330 + (easeT * (220 - (-330))); 
      offsetY = 220 + (easeT * (-30 - 220));
      angle = (Math.PI / 5 - (Math.PI * 1.5)) + (easeT * (Math.PI / 5 - (Math.PI / 5 - (Math.PI * 1.5))));
    }
  }

  // 최종 위치 적용 (걷기 반동 포함)
  ctx.translate(cx + offsetX, cy + offsetY + bob);
  ctx.rotate(angle);

  // --- 그래픽 디테일 업그레이드 ---
  // 1. 손잡이 (가죽 느낌 다크 브라운)
  ctx.fillStyle = '#3e2723';
  ctx.fillRect(-12, -100, 24, 130);
  
  // 2. 폼멜 (손잡이 끝 철장식)
  ctx.fillStyle = '#7f8c8d';
  ctx.beginPath(); ctx.arc(0, 30, 20, 0, Math.PI*2); ctx.fill();
  
  // 3. 메인 철퇴 바(Bar) (리얼리스틱 그레이)
  ctx.fillStyle = '#95a5a6';
  ctx.fillRect(-16, -320, 32, 230);
  ctx.fillStyle = '#bdc3c7'; // 하이라이트(빛 반사)
  ctx.fillRect(-8, -320, 12, 230);

  // 4. 플랜지 (뼈를 으깨는 돌기 - 더욱 뾰족하게)
  ctx.fillStyle = '#7f8c8d';
  for(let i = 0; i < 4; i++) {
    const yPos = -290 + (i * 50);
    ctx.beginPath();
    ctx.moveTo(-16, yPos - 15); ctx.lineTo(-38, yPos); ctx.lineTo(-16, yPos + 15);
    ctx.moveTo(16, yPos - 15);  ctx.lineTo(38, yPos);  ctx.lineTo(16, yPos + 15);
    ctx.fill();
  }

  ctx.restore();
}

// --- [NEW] 팔꿈치(우클릭 메카) 공격 렌더링 (팍! 스윽 타격감 강화) ---
function renderMeleeElbow(swing) {
  if (swing <= 0) return;
  const cx = SCREEN_W / 2;
  const cy = SCREEN_H;

  // 걷기 반동 제외 (근접 공격 시에는 안정적인 조준이 필요)
  
  ctx.save();
  ctx.shadowBlur = 0; // 최적화

  // 공격 지속 시간 (기존 swingdt * 5 비율 기반으로 대략적인 COOLDOWN 추정)
  const MELEE_SWING_MAX = 1.0; 
  const totalProgress = swing / MELEE_SWING_MAX; // 0 -> 1 로 정규화
  
  let offsetX = 0;
  let offsetY = 0;
  let angle = 0;

  // --- [핵심 수정] Easings 애니메이션 (팍! 스윽 느낌 구현) ---
  if (totalProgress < 0.25) { 
    // 1단계: 강하게 뻗기 (0%~25% 구간, '팍!' 터지는 펀치)
    const t = totalProgress / 0.25; // 0 -> 1 로 정규화
    const easeT = easeOutBack(t); // 후반 감속 + 살짝 튕김 적용

    // 화면 가운데에서 앞으로 팍! 뻗어나감
    offsetX = -(easeT * 120); 
    offsetY = -(easeT * 350); // 앞으로 쭉!
    angle = -(easeT * Math.PI / 12); // 사선으로 꽂음

  } else {
    // 2단계: 천천히 회수 (25%~100% 구간, '스윽~' 복귀)
    const t = (totalProgress - 0.25) / 0.75; // 0 -> 1 로 정규화
    const easeT = easeOutQuad(t); // 후반 부드러운 감속 적용

    // 팍! 뻗었던 위치(-350)에서 제자리(0)로 감속하며 복귀
    offsetX = -120 + (easeT * (0 - (-120)));
    offsetY = -350 + (easeT * (0 - (-350)));
    angle = -(Math.PI / 12) + (easeT * (Math.PI / 12));
  }

  // 최종 위치 적용
  ctx.translate(cx + offsetX, cy + offsetY);
  ctx.rotate(angle);

  // --- 팔꿈치 그래픽 (레트로 스타일) ---
  // 1. 소매 (팔꿈치 위 팔)
  ctx.fillStyle = '#081c15';
  ctx.fillRect(-60, -80, 120, 160);
  
  // 2. 소매 끝동
  ctx.fillStyle = '#1b4332';
  ctx.fillRect(-65, -90, 130, 20);
  
  // 3. 살색 (팔뚝)
  ctx.fillStyle = '#edc9af';
  ctx.fillRect(-50, -220, 100, 140);
  
  // 4. 전술 팔찌 (장식)
  ctx.fillStyle = '#7f8c8d';
  ctx.fillRect(-52, -210, 104, 15);

  ctx.restore();
}


//---/// 일반 단일 총기 (오리지널 비주얼 완전 복구) ///---
function renderGun() {
  if (gun.clericMode) { renderGunCleric(); return; }

  const bx = SCREEN_W / 2;
  const by = SCREEN_H - 10;
  const bob = Math.sin(player.bobPhase) * player.bobAmt * 8;
  
  let reloadDip = 0;
  if (gun.reloading) { 
    const prog = 1 - gun.reloadTimer / gun.RELOAD_TIME; 
    reloadDip = Math.sin(prog * Math.PI) * 60; 
  }
  const kick = player.kickAmt + reloadDip; 
  const t = player.meleeSwing;
  
  const pivotX = 120; const pivotY = 30;
  const swingPhase = t > 0.5 ? (1 - t) * 2 : t * 2;
  const maxAngle = -0.4; const swingAngle = maxAngle * Math.sin(swingPhase * Math.PI * 0.5);
  const swingOffX = -Math.sin(swingPhase * Math.PI * 0.5) * 120; 
  const swingOffY = Math.sin(swingPhase * Math.PI * 0.5) * 80;
  const topVisible = t > 0 && swingPhase > 0.55;

  ctx.save();
  
  if (meleeFlash > 0) {
    ctx.globalAlpha = meleeFlash * 3; 
    const fx = bx - 30, fy = by - 140 + bob;
    const g2 = ctx.createRadialGradient(fx, fy, 2, fx, fy, 28);
    g2.addColorStop(0, '#fff'); g2.addColorStop(0.4, '#fa0'); g2.addColorStop(1, 'transparent');
    ctx.fillStyle = g2; ctx.beginPath(); ctx.arc(fx, fy, 28, 0, Math.PI * 2); ctx.fill(); 
    ctx.globalAlpha = 1;
  }

  ctx.translate(bx, by);

  if (t > 0) { 
    ctx.translate(pivotX + swingOffX, pivotY + swingOffY); 
    ctx.rotate(swingAngle); 
    ctx.translate(-pivotX, -pivotY); 
  }

  ctx.translate(0, bob + kick);
  
  // 오리지널 공통 블록 호출
  drawOriginalGunBlocks(ctx, muzzleFlash, topVisible);

  ctx.restore();
}
function renderCrosshair() {
  const cx = SCREEN_W / 2;
  const cy = SCREEN_H / 2;
  const sz = 10;
  const gap = 3;

  ctx.save();
  ctx.shadowBlur = 0;

  // 1. 기본 에임(십자선) - 중앙 고정
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
  ctx.lineWidth = 1.5;
  ctx.shadowColor = 'rgba(0, 0, 0, 0.8)';
  ctx.shadowBlur = 3;
  ctx.beginPath();
  ctx.moveTo(cx-sz-gap, cy); ctx.lineTo(cx-gap, cy);
  ctx.moveTo(cx+gap, cy); ctx.lineTo(cx+sz+gap, cy);
  ctx.moveTo(cx, cy-sz-gap); ctx.lineTo(cx, cy-gap);
  ctx.moveTo(cx, cy+gap); ctx.lineTo(cx, cy+sz+gap);
  ctx.stroke();

  ctx.shadowBlur = 0;

  if (gun._infiniteMag) {
    ctx.font = "bold 32px Share Tech Mono"; 
    ctx.fillStyle = '#44ff44'; 
    ctx.textAlign = "center";
    ctx.fillText('∞', cx, cy + 40); 
    ctx.restore();
    return; 
  }

  // --- [위치 제어 변수] ---
  const ammoOffset = 75;   // 잔탄 게이지가 커진 만큼 좌우 거리를 100 -> 130으로 벌림
  const magOffsetY = 50;    // 탄창 게이지 하단 거리 유지

  // --- [크기 업그레이드] 양옆 잔탄 원형 게이지 전용 설정 ---
  const arcRadius = 55;        // 반지름 38 -> 55로 대폭 확대
  const arcAngle = Math.PI / 3; // 호의 각도 45도 -> 60도로 길게 연장
  const halfArc = arcAngle / 2;
  ctx.lineCap = 'round'; 

  function drawArcGauge(x, y, startAngle, endAngle, isCCW, current, max, color) {
    const ratio = max > 0 ? Math.max(0, Math.min(1, current / max)) : 0;
    const totalSweep = isCCW ? (startAngle - endAngle) : (endAngle - startAngle);
    
    // 잔탄 게이지 배경 두께 6 -> 8 로 확대
    ctx.beginPath();
    ctx.arc(x, y, arcRadius, startAngle, endAngle, isCCW);
    ctx.strokeStyle = 'rgba(0, 0, 0, 0.5)';
    ctx.lineWidth = 8; 
    ctx.stroke();

    // 잔탄 게이지 채움 두께 4.5 -> 6 으로 확대
    if (ratio > 0) {
      ctx.beginPath();
      const currentEnd = isCCW ? (startAngle - totalSweep * ratio) : (startAngle + totalSweep * ratio);
      ctx.arc(x, y, arcRadius, startAngle, currentEnd, isCCW);
      ctx.strokeStyle = color;
      ctx.lineWidth = 6; 
      ctx.stroke();
    }
  }

  function getGaugeColor(current, max) {
    const ratio = max > 0 ? current / max : 0;
    if (ratio > 0.6) return '#44ff44'; 
    if (ratio > 0.3) return '#ffcc00'; 
    return '#ff3333';                  
  }

  // 잔탄용 폰트 크기 14px -> 20px로 확대
  ctx.font = "bold 20px Share Tech Mono";

  // 2. 우측 총기 잔탄
  const rightX = cx + ammoOffset;
  const rightColor = getGaugeColor(gun.mag, gun.MAG_SIZE);
  drawArcGauge(rightX, cy, halfArc, -halfArc, true, gun.mag, gun.MAG_SIZE, rightColor);
  
  ctx.fillStyle = rightColor;
  ctx.textAlign = "left";
  ctx.fillText(gun.mag, rightX + arcRadius + 15, cy + 7);

  // 3. 좌측 총기 잔탄 (건카타 발동 시 대칭 렌더링)
  if (gun.clericMode && gun._cleric2ndMag !== undefined) {
    const leftX = cx - ammoOffset;
    const leftColor = getGaugeColor(gun._cleric2ndMag, gun.MAG_SIZE);
    drawArcGauge(leftX, cy, Math.PI - halfArc, Math.PI + halfArc, false, gun._cleric2ndMag, gun.MAG_SIZE, leftColor);
    
    ctx.fillStyle = leftColor;
    ctx.textAlign = "right";
    ctx.fillText(gun._cleric2ndMag, leftX - arcRadius - 15, cy + 7);
  }

  // --- 4. 하단 여분 탄창(MAG) 직선 바 (기존 크기 유지) ---
  const maxMags = 9; 
  const magColor = getGaugeColor(gun.mags, maxMags);
  const barWidth = 64; 
  
  const startX = cx - (barWidth / 2);
  const barY = cy + 40 + magOffsetY; // 잔탄 크기와 무관하게 위치 고정
  const magRatio = Math.max(0, Math.min(1, gun.mags / maxMags));

  // 탄창 직선 바는 기존 두께(6 / 4.5) 유지
  ctx.beginPath();
  ctx.moveTo(startX, barY);
  ctx.lineTo(startX + barWidth, barY);
  ctx.strokeStyle = 'rgba(0, 0, 0, 0.5)';
  ctx.lineWidth = 6;
  ctx.stroke();

  if (magRatio > 0) {
    ctx.beginPath();
    ctx.moveTo(startX, barY);
    ctx.lineTo(startX + (barWidth * magRatio), barY);
    ctx.strokeStyle = magColor;
    ctx.lineWidth = 4.5;
    ctx.stroke();
  }
  
  // 탄창 텍스트는 14px 폰트로 되돌려서 렌더링
  ctx.font = "bold 14px Share Tech Mono";
  ctx.fillStyle = magColor;
  ctx.textAlign = "center";
  ctx.fillText(`M${gun.mags}`, cx, barY + 18);

  ctx.restore();
}


function _drawBeam(beamX, beamY, beamTimer) {
  //---/// beamTimer 무관하게 고정 알파 — 빔 영구 유지 ///---
  const beamAlpha = 0.85;
  const dx = beamX - player.x, dy = beamY - player.y;
  let sa = Math.atan2(dy, dx) - player.angle;
  while (sa >  Math.PI) sa -= Math.PI * 2;
  while (sa < -Math.PI) sa += Math.PI * 2;
  if (Math.abs(sa) > HALF_FOV + 0.2) return;
  const dist = Math.hypot(dx, dy);
  if (dist < 0.4) return;
  const corrected = dist * Math.cos(sa);
  const screenX = Math.floor(((sa / FOV) + 0.5) * SCREEN_W);
  //---/// 빔 하단: 지면 기준 스프라이트 발 위치 ///---
  const spriteH = Math.floor((SCREEN_H / corrected) * 0.85);
  const spriteBottom = Math.floor((SCREEN_H + spriteH) / 2);
  const beamBottom = Math.min(SCREEN_H, spriteBottom);
  //---/// 빔은 화면 최상단(y=0)에서 하단까지 — 천장 없음 연출 ///---
  const beamTop = 0;
  const beamW = Math.max(6, Math.floor(SCREEN_H / Math.max(corrected, 0.5) * 0.06));
  
  //---/// 깜빡임(Math.sin) 제거, 그라데이션 제거 유지 ///---
  for (let layer = 3; layer >= 0; layer--) {
    const w = beamW * (1 + layer * 1.5);
    
    // 시간에 따른 투명도 변화 수식을 제거하고 일정한 투명도(고정 알파값)를 적용합니다.
    const a = beamAlpha * (0.08 + (3 - layer) * 0.25);
    
    ctx.save();
    ctx.globalAlpha = Math.min(1, a);
    
    // 코어(layer 0)는 밝은 흰색/하늘색, 외곽 글로우는 짙은 푸른색으로 단색 설정
    ctx.fillStyle = layer === 0 ? 'rgb(200, 235, 255)' : 'rgb(40, 120, 255)';
    
    ctx.fillRect(screenX - w / 2, beamTop, w, beamBottom - beamTop);
    ctx.restore();
  }
}

function renderDamageFlash(dt) {
  // 1. 기본 피격 화면 깜빡임 처리
  const el = document.getElementById('damage-flash');
  el.style.background = damageFlashAlpha > 0 ? `rgba(200,0,0,${(damageFlashAlpha * 0.5).toFixed(2)})` : 'transparent';
  damageFlashAlpha = Math.max(0, damageFlashAlpha - dt * 2.5);

  // 2. 벽에 끼었을 때(Stuck) 주황색 테두리 경고 처리
  stuckFlash = Math.max(0, stuckFlash - dt * 1.8);
  const stuck = isStuck();
  if (stuck || stuckFlash > 0) {
    const alpha = stuck ? 0.55 + Math.sin(Date.now() / 120) * 0.2 : stuckFlash * 0.55;
    ctx.save();
    const grad = ctx.createLinearGradient(0, 0, SCREEN_W, SCREEN_H);
    grad.addColorStop(0, `rgba(255,140,0,${alpha.toFixed(2)})`);
    grad.addColorStop(1, `rgba(255,60,0,${(alpha*0.6).toFixed(2)})`);
    ctx.strokeStyle = grad; ctx.lineWidth = 18;
    ctx.strokeRect(9, 9, SCREEN_W - 18, SCREEN_H - 18);
    if (stuck) {
      ctx.fillStyle = `rgba(255,160,0,${(alpha * 1.2).toFixed(2)})`;
      ctx.font = 'bold 18px Share Tech Mono'; ctx.textAlign = 'center';
      ctx.fillText('[ STUCK — SPACE to teleport ]', SCREEN_W / 2, SCREEN_H - 24);
    }
    ctx.restore();
  }

  // 3. 공격받은 방향을 알려주는 피격 인디케이터 (filter 및 이중 루프 최적화 완료)
  const cx = SCREEN_W / 2; const cy = SCREEN_H / 2; const radius = Math.min(cx, cy) - 120; 
  let keepInd = 0;
  
  for (let i = 0; i < damageIndicators.length; i++) {
    const ind = damageIndicators[i];
    ind.alpha -= dt * 1.5; 
    
    if (ind.alpha > 0) {
      damageIndicators[keepInd++] = ind;
      let relAngle = ind.angle - player.angle;
      while (relAngle > Math.PI) relAngle -= Math.PI * 2;
      while (relAngle < -Math.PI) relAngle += Math.PI * 2;

      ctx.save(); ctx.translate(cx, cy); ctx.rotate(relAngle - Math.PI / 2);
      ctx.lineWidth = 30; ctx.lineCap = 'round'; ctx.shadowBlur = 20; ctx.shadowColor = '#f00'; ctx.strokeStyle = `rgba(255, 0, 0, ${ind.alpha * 0.8})`;
      ctx.beginPath(); ctx.arc(0, 0, radius, -Math.PI / 4, Math.PI / 4); ctx.stroke();
      ctx.restore();
    }
  }
  damageIndicators.length = keepInd;

  // 4. [NEW] 보스 장판(AoE) 회피 경고 오버레이
  let inDangerZone = false;
  if (typeof bossAoes !== 'undefined') {
    bossAoes.forEach(a => {
      if (!a.triggered && Math.hypot(a.x - player.x, a.y - player.y) < a.r) {
        inDangerZone = true;
      }
    });
  }
  
  if (inDangerZone) {
    const pulse = 0.3 + Math.abs(Math.sin(Date.now() / 100)) * 0.3;
    ctx.save();
    // 화면 가장자리가 붉게 점멸
    const grad = ctx.createRadialGradient(SCREEN_W/2, SCREEN_H/2, SCREEN_H*0.2, SCREEN_W/2, SCREEN_H/2, SCREEN_H*0.7);
    grad.addColorStop(0, 'rgba(255, 0, 0, 0)');
    grad.addColorStop(1, `rgba(255, 0, 0, ${pulse})`);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, SCREEN_W, SCREEN_H);
    
    // 중앙 하단 텍스트 경고 문구
    ctx.fillStyle = `rgba(255, 50, 0, ${pulse + 0.4})`;
    ctx.font = 'bold 36px Share Tech Mono'; ctx.textAlign = 'center';
    ctx.shadowColor = '#f00'; ctx.shadowBlur = 10;
    ctx.fillText('⚠ EVADE AREA ⚠', SCREEN_W / 2, SCREEN_H - 140);
    ctx.restore();
  }
}

function showUpgradeUI(onDone) {
  let pool = UPGRADES.filter(u => {
    if (gun.CALIBER === '12gauge' && u.id === 'caliber_12g') return false;
    if (gun.CALIBER === '20mm'    && u.id === 'caliber_20mm') return false;
    if (gun.CALIBER === '9mm'     && u.id === 'caliber_9mm') return false;
    if (u.max && UPG(u.id) >= u.max) return false;
    if (u.condition && !u.condition()) return false;
    return true;
  });

  const guaranteed = pool.filter(u => u.guaranteed && u.guaranteed());
  const normal = pool.filter(u => !u.guaranteed || !u.guaranteed());
  const picks = [...guaranteed];
  const copy = [...normal];
  while (picks.length < 3 && copy.length > 0) picks.push(copy.splice(Math.floor(Math.random() * copy.length), 1)[0]);

  const choicesEl = document.getElementById('upgrade-choices');
  const overlayEl = document.getElementById('upgrade-overlay');
  const tooltip = document.getElementById('up-tooltip-global');
  choicesEl.innerHTML = '';
  choicesEl.style.pointerEvents = 'none';

  picks.forEach(up => {
    let btnClass = 'upgrade-btn';
    if (up.group === 'caliber') btnClass += ' caliber-btn';
    if (up.group === 'magic') btnClass += ' magic-btn';
    if (up.group === 'darkmagic') btnClass += ' darkmagic-btn';
    if (up.id === 'heroic_spirit' || up.id === 'cleric') btnClass += ' ultimate-btn';

    const btn = document.createElement('button');
    btn.className = btnClass;
    btn.innerHTML = `<span class="up-name">${up.name}</span><span class="up-short">${up.short || ''}</span>`;

    btn.addEventListener('mouseenter', () => {
      tooltip.innerHTML = up.desc();
      tooltip.style.display = 'block';
    });
    btn.addEventListener('mousemove', ev => {
      const x = ev.clientX + 16, y = ev.clientY - 10;
      tooltip.style.left = Math.min(x, window.innerWidth - 300) + 'px';
      tooltip.style.top = Math.max(y, 4) + 'px';
    });
    btn.addEventListener('mouseleave', () => {
      tooltip.style.display = 'none';
    });
    btn.addEventListener('click', () => {
      tooltip.style.display = 'none';
      applyUpgradeSelection(up);
      overlayEl.style.display = 'none';
      state.upgrading = false;

      if (onDone) {
        onDone();
      } else if (_shouldRestorePointerLockAfterUpgrade && state.pendingUpgrades <= 0) {
        requestGameplayPointerLock();
      }
    });
    choicesEl.appendChild(btn);
  });

  _shouldRestorePointerLockAfterUpgrade = isPointerLocked();
  state.upgrading = true;
  if (_shouldRestorePointerLockAfterUpgrade) document.exitPointerLock();
  overlayEl.style.display = 'flex';

  setTimeout(() => {
    if (state.upgrading) choicesEl.style.pointerEvents = 'auto';
  }, 500);
}
function renderPellets(dt) {
  if (screenPellets.length === 0) return;
  
  // [최적화] filter와 forEach를 통합하여 새 배열 생성(GC) 방지
  let keepCount = 0;
  for (let i = 0; i < screenPellets.length; i++) {
    const p = screenPellets[i];
    p.life -= dt;
    if (p.life > 0) {
      screenPellets[keepCount++] = p;
    }
  }
  screenPellets.length = keepCount;
  
  const cx = SCREEN_W / 2;
  const cy = SCREEN_H / 2; 
  const pixPerRad = SCREEN_W / FOV;
  
  ctx.save(); 
  ctx.globalCompositeOperation = 'lighter';

  // [수정됨] 억지로 묶어주던 renderedTimes 로직을 삭제했습니다.
  // 발사 로직에서 이미 필요한 개수만큼만 넘겨주므로 그대로 그립니다.

  screenPellets.forEach(p => {
    const t = Math.max(0, p.life / p.maxLife);
    const easeT = 1 - Math.pow(1 - t, 2); 
    
    const relAngle = p.angle - player.angle; 
    let sa = relAngle;
    while (sa >  Math.PI) sa -= Math.PI * 2;
    while (sa < -Math.PI) sa += Math.PI * 2;
    
    const screenX = cx + sa * pixPerRad;

    let gunX = SCREEN_W / 2 ;   // 총구 위치에 더 가깝게
    if (p.side === 'left') gunX = SCREEN_W / 2 - 120;
    else if (p.side === 'right') gunX = SCREEN_W / 2 + 120;

    const gunY = SCREEN_H - 55;
    
    const targetX = screenX; 
    const targetY = cy - 20;
    
    const prog = 1 - easeT; 
    
    const speedMult = p.speedMult || 0.4; 
    const tailLength = speedMult * 0.6; 
    
    const sx = gunX + (targetX - gunX) * Math.max(0, prog - tailLength); 
    const sy = gunY + (targetY - gunY) * Math.max(0, prog - tailLength);
    const ex = gunX + (targetX - gunX) * Math.min(1, prog + speedMult); 
    const ey = gunY + (targetY - gunY) * Math.min(1, prog + speedMult);
    
    const baseSize = Math.max(1, (p.size || 2) * 1.0);
    const alpha = easeT * (p.alphaMult || 1.0);
    
    ctx.lineCap = 'round';
    
    // 1. 외곽 예광탄 글로우
    ctx.beginPath(); 
    ctx.moveTo(sx, sy); 
    ctx.lineTo(ex, ey); 
    ctx.strokeStyle = p.color || '#ff4400'; 
    ctx.lineWidth = baseSize * 2.8; 
    ctx.globalAlpha = alpha * 0.8;
    ctx.shadowColor = p.glow || '#ff1100'; 
    ctx.shadowBlur = 6; 
    ctx.stroke(); 
    
    // 2. 중심 초고온 코어
    ctx.beginPath(); 
    ctx.moveTo(sx, sy); 
    ctx.lineTo(ex, ey); 
    ctx.strokeStyle = '#ffffff'; 
    ctx.lineWidth = baseSize * 0.8; 
    ctx.globalAlpha = alpha;
    ctx.shadowBlur = 0; 
    ctx.stroke();
  });
  
  ctx.restore();
}
function spawnShootEffects(posType) {
  let startX, startY = SCREEN_H - 130, dirX;
  
  if (posType === 'left') {
    startX = SCREEN_W / 2 - 140; // 클레릭 왼쪽 총구
    dirX = -1; // 탄피가 왼쪽 밖으로 튀게
  } else if (posType === 'right') {
    startX = SCREEN_W / 2 + 140; // 클레릭 오른쪽 총구
    dirX = 1; // 탄피가 오른쪽 밖으로 튀게
  } else { 
    // 'center' (일반 총기)
    startX = SCREEN_W / 2 + 40; // 중앙에서 살짝 우측 (탄피 배출구)
    dirX = 1; 
  }

  // 1. 탄피 배출 (회전하며 포물선으로 떨어짐)
  cappedPush(screenParticles, PERF_CAP_SCREEN_PARTICLES, {
    x: startX + dirX * 30, y: startY + 40,
    vx: dirX * (180 + Math.random() * 120), 
    vy: -250 - Math.random() * 150,         
    life: 1.0, type: 'shell', 
    rotation: Math.random() * Math.PI * 2, 
    rotSpeed: (Math.random() - 0.5) * 30
  });

  // 2. 총구 연기 (점점 퍼지며 사라짐)
  for(let i = 0; i < 4; i++) {
    cappedPush(screenParticles, PERF_CAP_SCREEN_PARTICLES, {
      x: startX + dirX * 10 + (Math.random()-0.5)*20, 
      y: startY - 20 + (Math.random()-0.5)*20,
      vx: dirX * (Math.random() - 0.5) * 60, 
      vy: -50 - Math.random() * 80, 
      life: 0.5 + Math.random() * 0.4, 
      type: 'smoke', 
      size: 10 + Math.random() * 15
    });
  }
}

// --- [NEW] 사격 화면 이펙트 업데이트 & 렌더링 ---
function renderScreenParticles(dt) {
  if (screenParticles.length === 0) return;
  ctx.save();
  
  let keepCount = 0;
  for (let i = 0; i < screenParticles.length; i++) {
    const p = screenParticles[i];
    p.life -= dt;
    
    if (p.life > 0) {
      screenParticles[keepCount++] = p; // 죽은 파티클을 덮어쓰며 앞으로 당김
      
      p.x += p.vx * dt;
      p.y += p.vy * dt;

      if (p.type === 'shell') {
        p.vy += 1200 * dt;
        p.rotation += p.rotSpeed * dt;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation);
        ctx.fillStyle = '#ffaa00';
        ctx.fillRect(-6, -3, 12, 6);
        ctx.fillStyle = '#cc7700';
        ctx.fillRect(-6, 1, 12, 2);
        ctx.restore();
      } else if (p.type === 'smoke') {
        p.size += 30 * dt;
        ctx.globalAlpha = Math.max(0, p.life) * 0.25;
        ctx.fillStyle = '#aaaaaa';
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }
  screenParticles.length = keepCount; // 끝에 남은 찌꺼기 싹둑 자르기
  
  ctx.restore();
}
//---/// 적 레이더 — 잔여 적 4명 이하 + 비보스 스테이지 시 벽 너머 적 위치 오버레이 표시 ///---
// [핵심 최적화] 파티클 전용 3D 렌더 패스 — 정렬 없이 순서대로 그림
// 파티클은 서로 겹쳐도 시각적으로 크게 티가 나지 않으므로 거리 정렬 불필요
function renderParticles3D(zBuffer, bobY) {
  for (let pi = 0; pi < particles.length; pi++) {
    const p = particles[pi];
    const dx = p.x - player.x, dy = p.y - player.y;
    const dist = Math.hypot(dx, dy);
    if (dist < 0.3) continue;
    let sa = Math.atan2(dy, dx) - player.angle;
    while (sa >  Math.PI) sa -= Math.PI * 2;
    while (sa < -Math.PI) sa += Math.PI * 2;
    if (Math.abs(sa) > HALF_FOV + 0.3) continue;
    const corrected = dist * Math.cos(sa);
    if (corrected <= 0) continue;
    const ri = Math.min(NUM_RAYS - 1, Math.max(0, Math.round(((sa / FOV) + 0.5) * NUM_RAYS)));
    if (corrected >= zBuffer[ri]) continue; // 벽 뒤
    const spriteH = Math.floor((SCREEN_H / corrected) * 0.85);
    const screenX = Math.floor(((sa / FOV) + 0.5) * SCREEN_W);
    const spriteTop = Math.floor((SCREEN_H - spriteH) / 2 + bobY);
    if (p.isEmber) {
      const flicker = 0.5 + 0.5 * Math.sin(Date.now() / 80 + p.x * 31.7);
      const lifeRatio = Math.min(1, p.life / (p.maxLife || 1));
      const sz = Math.max(1, Math.floor(spriteH * 0.045 * lifeRatio * (0.6 + flicker * 0.4)));
      const ey = spriteTop + spriteH * 0.93;
      ctx.globalAlpha = lifeRatio * (0.5 + flicker * 0.5);
      ctx.fillStyle = p.color;
      ctx.fillRect(screenX - sz * 0.5, ey - sz * 0.5, sz, sz);
      ctx.globalAlpha = 1;
    } else if (p.isAsh) {
      const lifeRatio = p.life / (p.maxLife || 1);
      const sz = Math.max(1, Math.floor(spriteH * 0.05 * lifeRatio));
      const py = spriteTop + spriteH * (0.5 - (lifeRatio - 0.5) * 0.8);
      ctx.globalAlpha = lifeRatio;
      ctx.fillStyle = p.color;
      ctx.fillRect(screenX - sz * 0.5, py, sz, sz);
      ctx.globalAlpha = 1;
    } else {
      const sz = spriteH * 0.08 * Math.max(0.1, p.life);
      ctx.fillStyle = p.color || '#a00';
      const py = spriteTop + spriteH * 0.4 + spriteH * 0.6 * (1 - p.life);
      ctx.fillRect(screenX - sz * 0.5, py, sz, sz);
    }
  }
}
function renderEnemyRadar(zBuffer) {
  if (state.isBossStage || state.isShop) return;
  // [최적화 2단계 연계] filter 대신 루프로 카운트 및 배열 정리 (GC 방지)
  const alive = [];
  for (let i = 0; i < enemies.length; i++) {
    if (enemies[i].active && enemies[i].hp > 0) alive.push(enemies[i]);
  }
  if (alive.length === 0 || alive.length > 4) return;

  // --- [최적화] save/restore를 루프 바깥으로 한 번만 빼서 오버헤드 제거 ---
  ctx.save();
  ctx.textAlign = 'center';

  alive.forEach(en => {
    const dx = en.x - player.x, dy = en.y - player.y;
    let sa = Math.atan2(dy, dx) - player.angle;
    while (sa >  Math.PI) sa -= Math.PI * 2;
    while (sa < -Math.PI) sa += Math.PI * 2;

    const dist = Math.hypot(dx, dy);
    const corrected = dist * Math.cos(sa);
    const screenX = Math.floor(((sa / FOV) + 0.5) * SCREEN_W);

    if (Math.abs(sa) > HALF_FOV + 0.15) return;

    const ri = Math.min(NUM_RAYS - 1, Math.max(0, Math.round(screenX * NUM_RAYS / SCREEN_W)));
    if (corrected < zBuffer[ri]) return;

    const spriteH = Math.floor((SCREEN_H / corrected) * 0.85);
    const spriteTop = Math.floor((SCREEN_H - spriteH) / 2);
    const centerY = spriteTop + spriteH * 0.5;

    const alpha = Math.max(0.25, Math.min(0.75, 1 - dist / (MAX_DEPTH * 0.8)));
    const sz = Math.max(8, Math.min(32, spriteH * 0.35));

    ctx.globalAlpha = alpha;
    
    let radarColor = '#ff4444'; let radarGlow = '#ff0000';
    if (en.isShooter && !en.isSiege) { radarColor = '#cc88ff'; radarGlow = '#aa00ff'; }
    if (en.isSiege)    { radarColor = '#ff8833'; radarGlow = '#cc4400'; }
    if (en.isBrute)    { radarColor = '#ff6622'; radarGlow = '#cc3300'; }
    if (en.isPhantom)  { radarColor = '#cc55ff'; radarGlow = '#8800cc'; }
    if (en.isScreamer) { radarColor = '#ffcc00'; radarGlow = '#aa8800'; }
    if (en.isIronclad) { radarColor = '#80ccff'; radarGlow = '#004488'; }
    
    ctx.strokeStyle = radarColor;
    ctx.lineWidth = en.isBrute || en.isIronclad ? 3 : 2;
    ctx.shadowColor = radarGlow;
    ctx.shadowBlur = 8;
    
    ctx.beginPath(); ctx.arc(screenX, centerY, sz * 0.6, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(screenX - sz * 0.8, centerY); ctx.lineTo(screenX + sz * 0.8, centerY);
    ctx.moveTo(screenX, centerY - sz * 0.8); ctx.lineTo(screenX, centerY + sz * 0.8);
    ctx.stroke();
    
    ctx.font = `bold ${Math.max(10, sz * 0.7)}px Share Tech Mono`;
    ctx.fillStyle = radarColor;
    ctx.shadowBlur = 4;
    ctx.fillText(dist.toFixed(1), screenX, centerY + sz * 1.4);
  });
  
  ctx.restore();
}

function renderTelegraphs() {
  // [최적화] 캐시된 보스 참조로 배열 순회 방지
  const boss = (_cachedBoss && _cachedBoss.active && _cachedBoss.hp > 0 && _cachedBoss.castTimer > 0 && _cachedBoss.castType === 'slash') ? _cachedBoss : null;
  if (!boss || !boss.slashAngles) return;
  
  ctx.save();
  const progress = 1 - (boss.castTimer / 0.8); // 0.0(시작) ~ 1.0(발사 직전)
  
  boss.slashAngles.forEach(a => {
     ctx.beginPath();
     let started = false;
     // 보스 위치부터 15칸 앞까지 바닥에 선을 긋기 위한 3D 투영
     for (let d = 0.5; d <= 15; d += 0.5) {
        const wx = boss.x + Math.cos(a) * d;
        const wy = boss.y + Math.sin(a) * d;
        
        // 벽에 막히면 경고선도 거기서 끊어짐 (벽 투과 불가)
        if (isWall(wx, wy)) break; 

        const dx = wx - player.x, dy = wy - player.y;
        let sa = Math.atan2(dy, dx) - player.angle;
        while (sa >  Math.PI) sa -= Math.PI * 2;
        while (sa < -Math.PI) sa += Math.PI * 2;
        
        if (Math.abs(sa) > HALF_FOV + 0.5) continue;
        
        const dist = Math.hypot(dx, dy);
        if (dist < 0.1) continue;
        
        // 3D 바닥 좌표 계산
        const corrected = dist * Math.cos(sa);
        const screenX = Math.floor(((sa / FOV) + 0.5) * SCREEN_W);
        const spriteH = Math.floor((SCREEN_H / corrected) * 0.85);
        const screenY = Math.floor((SCREEN_H + spriteH) / 2); // 바닥 높이
        
        if (!started) {
           ctx.moveTo(screenX, screenY);
           started = true;
        } else {
           ctx.lineTo(screenX, screenY);
        }
     }
     // 경고선 렌더링 (시간이 지날수록 굵어지고 붉어짐)
     if (started) {
        ctx.strokeStyle = `rgba(255, 0, 0, ${0.2 + progress * 0.6})`;
        ctx.lineWidth = 4 + progress * 8; 
        ctx.lineCap = 'round';
        ctx.shadowColor = '#f00';
        ctx.shadowBlur = 10;
        ctx.stroke();
     }
  });

  enemies.forEach(en => {
    if (!en.active || en.hp <= 0 || !en.isSiege || en._laserAlpha <= 0) return;

    const points = [];
    for (let d = 0.5; d <= 14; d += 0.4) {
      const wx = en.x + Math.cos(en._aimAngle) * d;
      const wy = en.y + Math.sin(en._aimAngle) * d;
      if (isWall(wx, wy)) break;

      const dx = wx - player.x, dy = wy - player.y;
      let sa = Math.atan2(dy, dx) - player.angle;
      while (sa > Math.PI) sa -= Math.PI * 2;
      while (sa < -Math.PI) sa += Math.PI * 2;
      if (Math.abs(sa) > HALF_FOV + 0.45) continue;

      const dist = Math.hypot(dx, dy);
      if (dist < 0.1) continue;
      const corrected = dist * Math.cos(sa);
      if (corrected <= 0.01) continue;

      const screenX = Math.floor(((sa / FOV) + 0.5) * SCREEN_W);
      const spriteH = Math.floor((SCREEN_H / corrected) * 0.85);
      const screenY = Math.floor((SCREEN_H + spriteH) / 2);
      points.push([screenX, screenY]);
    }

    if (points.length >= 2) {
      ctx.beginPath();
      ctx.strokeStyle = `rgba(255,80,0,${0.18 + en._laserAlpha * 0.55})`;
      ctx.lineWidth = 3 + en._laserAlpha * 2;
      ctx.moveTo(points[0][0], points[0][1]);
      for (let i = 1; i < points.length; i++) ctx.lineTo(points[i][0], points[i][1]);
      ctx.stroke();
    }
  });

  ctx.restore();
}

function renderDead() {
  BGM.stop();
  //---/// 사망 시 커서 캡처 해제 ///---
  if (document.pointerLockElement === canvas) document.exitPointerLock();
  ctx.save(); ctx.fillStyle='rgba(150,0,0,0.65)'; ctx.fillRect(0,0,SCREEN_W,SCREEN_H);
  ctx.fillStyle='#c00'; ctx.font='bold 64px Share Tech Mono'; ctx.textAlign='center'; ctx.shadowColor='#f00'; ctx.shadowBlur=30;
  ctx.fillText('YOU DIED',SCREEN_W/2,SCREEN_H/2-20);
  ctx.font='18px Share Tech Mono'; ctx.shadowBlur=0; ctx.fillStyle='#888'; ctx.fillText('PRESS  ENTER  TO  RESTART',SCREEN_W/2,SCREEN_H/2+30);
  ctx.restore();
}


function gameLoop(timestamp) {
  if (!state.running) return;

  if (state.upgrading || state.paused) {
    lastTime = timestamp;
    requestAnimationFrame(gameLoop);
    return;
  }

  const dt = Math.min((timestamp - lastTime) / 1000, 0.05); lastTime = timestamp;

  if (portal) {
    portal.time += dt;
    if (portal.spawning) {
      portal.spawnProgress = Math.min(1, (portal.spawnProgress || 0) + dt * 1.25);
      if (portal.spawnProgress >= 1) { portal.spawning = false; portal.active = true; }
    }
  }
  //---/// portal2 업데이트 ///---
  if (portal2) {
    portal2.time += dt;
    if (portal2.spawning) {
      portal2.spawnProgress = Math.min(1, (portal2.spawnProgress || 0) + dt * 1.25);
      if (portal2.spawnProgress >= 1) { portal2.spawning = false; portal2.active = true; }
    }
  }

  if (state.fadeOut > 0) {
    state.fadeOut -= dt; state.fadeAlpha = Math.min(1, 1 - state.fadeOut / 0.8);
    if (state.fadeOut <= 0) {
      state.fadeOut = 0; state.fadeAlpha = 1;
      loadNextStage(); 
    }
  } else if (!state.dead) {
    //---/// 연사: 기계화 총몸 보유 + 마우스 누름 유지 시 쿨타임마다 자동 발사 ///---
    if (gun.autoFire && mouseLeftDown && state.running && !state.paused && !state.upgrading && !state.dead && document.pointerLockElement === canvas) tryShoot();
    
    //---/// 근성 아머 자동 회복 (12프레임 = 0.2초 단위 틱) ///---
    if (UPG('protection') > 0 && state.armor < state.maxArmor) {
      player.armorRegenTimer = (player.armorRegenTimer || 0) + dt;
      if (player.armorRegenTimer >= 0.2) {
        player.armorRegenTimer = 0; // 타이머 초기화
        state.armor = Math.min(state.maxArmor, state.armor + UPG('protection'));
        markHUDDirty(); // UI 즉각 갱신
      }
    }

    movePlayer(dt); updateEnemies(dt); updateEnemyBullets(dt); updateBossAoes(dt); updateItems(dt); updateParticles(dt); updateExplosionFX(dt); updateSoulFX(dt);
  }

  //---/// 화면 렌더링 파트 ///---
  const bobY = Math.sin(player.bobPhase) * player.bobAmt * 4;
  const zBuffer = castRays(bobY);
  
  renderSprites(zBuffer, bobY); 
  renderParticles3D(zBuffer, bobY); // [핵심 최적화] 파티클 전용 패스 — 정렬 부하 제거
  renderExplosionFX(zBuffer); 
  renderLightningLines(); 
  renderTelegraphs(); 
  renderEnemyRadar(zBuffer); // 적 레이더 
  renderSkyStrikes();        // 보스 번개 이펙트
  renderPellets(dt);
  renderMeleeElbow(player.meleeSwing);
  if (currentWeapon === 'gun') renderGun(); 
  else renderMace();
  renderMeleeElbow(player.meleeSwing);
  renderCrosshair(); 
  renderDamageFlash(dt); 
  renderPortalBeam();
  renderScreenParticles(dt)

  let interactionMsg = null;
  let interactionColor = '#fff';
  
  const merchant = _cachedMerchant && _cachedMerchant.active ? _cachedMerchant : null;
  if (merchant && Math.hypot(merchant.x - player.x, merchant.y - player.y) < 2.0) {
     // 플레이어의 현재 점수가 2500점 이상인지 확인하여 안내 문구 변경
     if (state.score >= 2500) {
       interactionColor = '#ffaa00';
       interactionMsg = '[E] TRADE SOULS FOR POWER (2500 SCORE)';
     } else {
       interactionColor = '#888';
       interactionMsg = 'NOT ENOUGH SOULS (2500 SCORE)';
     }
  } else {
     const _activePortal = (portal && portal.active && Math.hypot(portal.x - player.x, portal.y - player.y) < 1.5)
        || (portal2 && portal2.active && Math.hypot(portal2.x - player.x, portal2.y - player.y) < 1.5);
     if (_activePortal) interactionMsg = 'PRESS [E] TO ENTER VORTEX';
  }
  
  if (interactionMsg && state.fadeOut === 0) {
    ctx.save();
    ctx.fillStyle = interactionColor;
    ctx.font = 'bold 24px Share Tech Mono';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#000';
    ctx.shadowBlur = 6;
    ctx.fillText(interactionMsg, SCREEN_W / 2, SCREEN_H / 2 + 100);
    ctx.restore();
  }

  //---/// 사망 처리 ///---
  if (state.dead) renderDead();
  
  //---/// 화면 페이드 아웃/인 처리 ///---
  if (state.fadeOut > 0 && state.fadeAlpha > 0) { 
    ctx.save(); ctx.fillStyle = `rgba(0,0,0,${state.fadeAlpha.toFixed(3)})`; ctx.fillRect(0, 0, SCREEN_W, SCREEN_H); ctx.restore(); 
  }
  
  if (state.fadeIn > 0) {
    state.fadeIn = Math.max(0, state.fadeIn - dt);
    const alpha = state.fadeIn / 0.5; 
    ctx.save(); ctx.fillStyle = `rgba(0,0,0,${alpha.toFixed(3)})`; ctx.fillRect(0, 0, SCREEN_W, SCREEN_H);
    
    //---/// 상점 스테이지 진입 배너 ///---
    if (state.isShop && alpha > 0.3) {
      ctx.fillStyle = `rgba(100,200,255,${Math.min(1,(alpha-0.3)/0.4).toFixed(2)})`;
      ctx.font = 'bold 52px Share Tech Mono'; ctx.textAlign = 'center'; ctx.shadowColor = '#0af'; ctx.shadowBlur = 30;
      ctx.fillText('◆  REST AREA  ◆', SCREEN_W / 2, SCREEN_H / 2 - 20);
      ctx.shadowBlur = 0; ctx.font = '20px Share Tech Mono';
      ctx.fillText(`A MERCHANT APPEARED...`, SCREEN_W / 2, SCREEN_H / 2 + 30);
    } 
    //---/// 보스 스테이지 진입 배너 ///---
    else if (state.isBossStage && alpha > 0.3) {
      ctx.fillStyle = `rgba(200,0,0,${Math.min(1,(alpha-0.3)/0.4).toFixed(2)})`;
      ctx.font = 'bold 52px Share Tech Mono'; ctx.textAlign = 'center'; ctx.shadowColor = '#f00'; ctx.shadowBlur = 30;
      ctx.fillText('⚠  BOSS  STAGE  ⚠', SCREEN_W / 2, SCREEN_H / 2 - 20);
      ctx.shadowBlur = 0; ctx.font = '20px Share Tech Mono'; ctx.fillStyle = `rgba(255,180,180,${Math.min(1,(alpha-0.3)/0.4).toFixed(2)})`;
      ctx.fillText(`STAGE  ${state.stage}`, SCREEN_W / 2, SCREEN_H / 2 + 30);
    }
    ctx.restore();
  }

  //---/// 보스 스테이지: 포털 잠김 메시지 처리 ///---
  if (state.isBossStage && (!portal || !portal.active) && !state.dead) {
    const boss = _cachedBoss && _cachedBoss.active ? _cachedBoss : null;
    if (boss && boss._regenPhase) {
      ctx.save(); ctx.font = '16px Share Tech Mono'; ctx.textAlign = 'center';
      
      if (boss._retreating) {
        ctx.fillStyle = 'rgba(255,80,80,0.9)'; ctx.shadowColor='#f00'; ctx.shadowBlur=10;
        ctx.fillText('[ BOSS IS REPOSITIONING! ]', SCREEN_W / 2, SCREEN_H - 50);
      } else if (boss._spawningMinions) {
        ctx.fillStyle = 'rgba(200,0,255,0.9)'; ctx.shadowColor='#a0f'; ctx.shadowBlur=10;
        ctx.fillText('[ UNHOLY PORTAL OPENED! ]', SCREEN_W / 2, SCREEN_H - 50);
      } else if (boss._waitingMinions) {
        ctx.fillStyle = 'rgba(255,160,60,0.9)'; ctx.shadowColor='#f80'; ctx.shadowBlur=10;
        ctx.fillText('[ ELIMINATE ALL MINIONS TO RESUME BOSS FIGHT ]', SCREEN_W / 2, SCREEN_H - 50);
      } else {
        ctx.fillStyle = 'rgba(255,80,80,0.9)'; ctx.shadowColor='#f00'; ctx.shadowBlur=10;
        ctx.fillText('[ BOSS REGENERATING... ]', SCREEN_W / 2, SCREEN_H - 50);
      }
      ctx.restore();
    } else if (boss && !boss._regenPhase && !boss._waitingMinions) {
      ctx.save(); ctx.font = '16px Share Tech Mono'; ctx.textAlign = 'center';
      ctx.fillStyle = 'rgba(255,80,80,0.85)'; ctx.shadowColor='#f00'; ctx.shadowBlur=8;
      ctx.fillText('[ VORTEX LOCKED — DEFEAT THE BOSS ]', SCREEN_W / 2, SCREEN_H - 50);
      ctx.restore();
    }
  }

  // [최적화] HUD 더티 플래그 — 매 프레임 1회만 DOM 업데이트
  if (_hudDirty) { updateHUD(); _hudDirty = false; }

  requestAnimationFrame(gameLoop);
}

//---/// 민감도 슬라이더: 값 1~20 → MOUSE_SENSITIVITY 0.0005~0.01 ///---
function applySensitivity(val) {
  MOUSE_SENSITIVITY = val * 0.0005;
  const vm = document.getElementById('sens-val-main');
  const sm = document.getElementById('sens-slider-main');
  if (vm) vm.textContent = val;
  if (sm) sm.value = val;
  const vp = document.getElementById('sens-val-pause');
  if (vp) vp.textContent = val;
}
//---/// 민감도·BGM 슬라이더: 이벤트 위임으로 통일 (sens-slider-main 포함) ///---
document.addEventListener('input', e => {
  if (e.target && (e.target.id === 'sens-slider-main' || e.target.id === 'sens-slider-pause'))
    applySensitivity(parseInt(e.target.value));
  //---/// BGM 볼륨 슬라이더 위임 ///---
  if (e.target && e.target.id === 'bgm-vol-slider') {
    const val = parseInt(e.target.value) / 100;
    _bgmVol = val; _bgmMuted = false;
    BGM.setVolume(val);
    const v = document.getElementById('bgm-vol-val'); if (v) v.textContent = e.target.value;
    const btn = document.getElementById('bgm-mute-btn'); if (btn) btn.textContent = 'MUTE';
  }
});
//---/// BGM 음소거 버튼 위임 ///---
document.addEventListener('click', e => {
  if (e.target && e.target.id === 'bgm-mute-btn') {
    e.stopPropagation();
    _bgmMuted = !_bgmMuted;
    BGM.setVolume(_bgmMuted ? 0 : _bgmVol);
    e.target.textContent = _bgmMuted ? 'UNMUTE' : 'MUTE';
  }
});

document.getElementById('start-btn').addEventListener('click', () => {
  document.getElementById('overlay').style.display='none'; state.running=true;
  initGame(); lastTime=performance.now(); requestAnimationFrame(gameLoop); canvas.requestPointerLock();
  BGM.start();
});
</script>
</body>
</html>
