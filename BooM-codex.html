            life: 0.5+Math.random()*0.3, color: '#a0f' 
          });
        }
      }
    }
    
    // 사망한 적의 이동/공격 로직은 여기서부터 차단
    if (en.hp <= 0) return;
    if (en.isMerchant){
	  if (en.dialogueTimer > 0) en.dialogueTimer -= dt;
      return;
	}
	if (en.isUnholyPortal) return;
    en.hitFlash = Math.max(0, en.hitFlash - dt * 6);
    //---/// 끼인 적 자동 재배치 — 8방향 모두 벽이면 가장 가까운 방 중심으로 이동 ///---
    if (!en.isBoss) {
      const r = 0.2;
      const dirs = [[r,0],[-r,0],[0,r],[0,-r],[r,r],[-r,r],[r,-r],[-r,-r]];
      const wallCount = dirs.filter(([dx2,dy2]) => isWall(en.x+dx2, en.y+dy2)).length;
      if (wallCount >= 6 && currentRooms && currentRooms.length > 0) {
        let best = null, bestD = Infinity;
        currentRooms.forEach(rm => {
          const d = Math.hypot(rm.cx - en.x, rm.cy - en.y);
          if (d < bestD) { bestD = d; best = rm; }
        });
        if (best) { en.x = best.cx + 0.5; en.y = best.cy + 0.5; }
      }
    }
    //---/// 기절/빙결: 타이머 감소 — 둘 중 하나라도 남아 있으면 이동/공격 건너뜀 ///---
    if (en.stunTimer > 0)  en.stunTimer  = Math.max(0, en.stunTimer  - dt);
    if (en.frozenTimer > 0) en.frozenTimer = Math.max(0, en.frozenTimer - dt);
    //---/// 화상: 1초마다 10 데미지, burnTimer 소진 시 종료 ///---
    if (en.burnTimer > 0) {
      en.burnTimer = Math.max(0, en.burnTimer - dt);
      en.burnTickTimer = (en.burnTickTimer || 1.0) - dt;
      //---/// 화상 중 매 프레임 불똥 파티클 (위로 솟구치는 주홍 입자) ///---
      if (Math.random() < dt * 18) {
        const ang = -Math.PI * 0.5 + (Math.random() - 0.5) * 1.2;
        const spd = 1.5 + Math.random() * 2.5;
        const col = Math.random() < 0.5 ? '#ff4400' : '#ff8800';
        cappedPush(particles, PERF_CAP_PARTICLES, { x: en.x + (Math.random()-0.5)*0.3, y: en.y - 0.2,
          vx: Math.cos(ang)*spd*0.3, vy: Math.sin(ang)*spd - 1.5,
          life: 0.18 + Math.random()*0.14, color: col });
      }
      if (en.burnTickTimer <= 0) {
        en.burnTickTimer = 1.0;
        if (en.hp > 0) {
          en.hp -= 20;
          state.totalDamage += 20; // [NEW] 화상 틱 데미지 누적
          en.hitFlash = 0.6;
          spawnBlood(en.x, en.y, 2);
          //---/// 틱 시 불똥 집중 분출 ///---
          for (let i = 0; i < 8; i++) {
            const ang = -Math.PI * 0.5 + (Math.random() - 0.5) * 1.6;
            const spd = 2.0 + Math.random() * 3.5;
            const col = Math.random() < 0.6 ? '#ff3300' : '#ffaa00';
            cappedPush(particles, PERF_CAP_PARTICLES, { x: en.x + (Math.random()-0.5)*0.2, y: en.y,
              vx: Math.cos(ang)*spd*0.35, vy: Math.sin(ang)*spd - 1.8,
              life: 0.22 + Math.random()*0.18, color: col });
          }
          if (en.hp <= 0) { if (en.isBoss && !en._dead2) triggerBossRegen(en); else handleEnemyKill(en); }
        }
      }
    }
    if (en.stunTimer > 0 || en.frozenTimer > 0) return;
    const dx = player.x - en.x, dy = player.y - en.y; const dist = Math.hypot(dx, dy);
    en.frameTimer += dt; if (en.frameTimer > 0.3) { en.frame = (en.frame+1)%2; en.frameTimer = 0; }
    let canSeePlayer = false;
    if (dist < DETECT_RANGE) {
      en._losTimer = (en._losTimer || 0) - dt;
      if (en._losTimer <= 0) {
        // 모든 적이 동시에 연산하지 않도록 약간의 랜덤(0.05)을 섞어 부하를 분산시킵니다.
        en._losTimer = 0.15 + Math.random() * 0.05; 
        
        const steps = Math.ceil(dist * 6); 
        const sx = (player.x - en.x) / steps, sy = (player.y - en.y) / steps;
        let blocked = false;
        for (let s = 1; s < steps - 1; s++) {
          if (isWall(en.x + sx*s, en.y + sy*s)) { blocked = true; break; }
        }
        en._lastCanSee = !blocked; // 결과를 캐싱
      }
      canSeePlayer = en._lastCanSee || false; // 캐싱된 결과 재사용
    } else {
      en._lastCanSee = false;
    }
    if (canSeePlayer) { en.state = 'chase'; en.alertTimer = 4.0; }
    else if (en.state === 'chase') { en.alertTimer -= dt; if (en.alertTimer <= 0 || dist > LOSE_RANGE) { en.state = 'patrol'; en.patrolTarget = null; } }

    //---/// ShooterEnemy 전용 AI — 포착 즉시 1발, 적정거리 유지, 이탈 시 빗나감 ///---
    if (en.isShooter) {
      const SHOOT_RANGE = en.isSiege ? 12.0 : 8.0;
      const KEEP_DIST   = en.isSiege ? 6.0  : 4.5;
      const RETREAT_DIST = en.isSiege ? 4.0  : 3.0;
      let moveX = 0, moveY = 0;
      if (en.state === 'chase') {
        const ang = Math.atan2(dy, dx);

        //---/// 시야 포착 즉시 1발 선제 사격 (쿨타임 무시, 인생에 1회) ///---
        if (canSeePlayer && !en._firedOnSight) {
          en._firedOnSight = true;
          //---/// 적정 거리 내면 정확, 벗어나면 큰 빗나감 ///---
          const missOffset = (dist < RETREAT_DIST || dist > KEEP_DIST)
            ? (Math.random() < 0.5 ? 1 : -1) * (0.55 + Math.random() * 0.4)
            : (Math.random() - 0.5) * 0.35;
          const firstAng = ang + missOffset;
          cappedPush(enemyBullets, PERF_CAP_ENEMY_BULLETS, { x: en.x, y: en.y, vx: Math.cos(firstAng)*4.5, vy: Math.sin(firstAng)*4.5, life: 3.0, shooter: en });
          //---/// 선제사격 후 주기사격 쿨타임을 충분히 설정해 연발 방지 ///---
          en.attackCooldown = 2.2 + Math.random() * 1.2;
        }
        // _firedOnSight 리셋은 순찰 분기(아래)에서만 처리됩니다

        //---/// 적정 거리 유지 이동 ///---
        if (dist < RETREAT_DIST) {
          moveX = -Math.cos(ang) * enemyScale.speed * 0.8 * dt;
          moveY = -Math.sin(ang) * enemyScale.speed * 0.8 * dt;
        } else if (dist > KEEP_DIST) {
          moveX = Math.cos(ang) * enemyScale.speed * 0.55 * dt;
          moveY = Math.sin(ang) * enemyScale.speed * 0.55 * dt;
        }

        //---/// 주기적 사격 — 적정거리 밖이면 반드시 빗나감 ///---
        if (canSeePlayer && dist < SHOOT_RANGE) {
          if (en.attackCooldown <= 0 && !en._shootInitialized) {
            en._shootInitialized = true;
            en.attackCooldown = (en.isSiege ? 2.0 : 2.2) + Math.random() * 1.2;
          }
          en._shootInitialized = true;

          if (en.isSiege) {
            en._aimAngle = ang;

            if (!en._isCharging) {
              en.attackCooldown -= dt;
              en.chargeTime = 0;

              if (en.attackCooldown <= 0) {
                en._attackMode = Math.random() < 0.5 ? 'charge' : 'shotgun';
                en._isCharging = true;
                en._chargeTimer = en._attackMode === 'charge' ? 1.1 : 0.7;
                en.chargeTime = 1.0;
                en._laserAlpha = 1.0;
              }
            } else {
              const maxCharge = en._attackMode === 'charge' ? 1.1 : 0.7;
              en._chargeTimer -= dt;
              en.chargeTime = Math.max(0, en._chargeTimer / maxCharge);
              en._laserAlpha = 0.35 + en.chargeTime * 0.65;

              if (en._chargeTimer <= 0) {
                if (en._attackMode === 'charge') {
                  cappedPush(enemyBullets, PERF_CAP_ENEMY_BULLETS, {
                    x: en.x, y: en.y,
                    vx: Math.cos(ang) * 7.5, vy: Math.sin(ang) * 7.5,
                    life: 4.2, shooter: en, pierce: 2, siegeCharge: true
                  });
                } else {
                  for (let s = -2; s <= 2; s++) {
                    const spread = s * 0.11 + (Math.random() - 0.5) * 0.03;
                    cappedPush(enemyBullets, PERF_CAP_ENEMY_BULLETS, {
                      x: en.x, y: en.y,
                      vx: Math.cos(ang + spread) * 5.3, vy: Math.sin(ang + spread) * 5.3,
                      life: 2.4, shooter: en, siegeShotgun: true
                    });
                  }
                }

                en._isCharging = false;
                en._laserAlpha = 0;
                en.chargeTime = 0;
                en.attackCooldown = 2.3 + Math.random() * 1.1;
              }
            }
          } else {
            en.attackCooldown -= dt;
            const CHARGE_DUR = 0.8;
            en.chargeTime = en.attackCooldown < CHARGE_DUR ? Math.max(0, 1 - en.attackCooldown / CHARGE_DUR) : 0;

            if (en.attackCooldown <= 0) {
              en.attackCooldown = 2.2 + Math.random() * 1.2;
              en.chargeTime = 0;
              const atIdealRange = (dist >= RETREAT_DIST && dist <= KEEP_DIST);
              const missAmt = atIdealRange
                ? (Math.random() - 0.5) * 0.35
                : (Math.random() < 0.5 ? 1 : -1) * (0.6 + Math.random() * 0.45);
              const shootAng = ang + missAmt;
              cappedPush(enemyBullets, PERF_CAP_ENEMY_BULLETS, { x: en.x, y: en.y, vx: Math.cos(shootAng)*4.5, vy: Math.sin(shootAng)*4.5, life: 3.0, shooter: en });
            }
          }
        } else {
          en.chargeTime = 0;
          if (en.isSiege) {
            en._laserAlpha = 0;
            en._isCharging = false;
          }
        }
      } else {
        //---/// 순찰 중 ///---
        en._firedOnSight = false;
        en.patrolTimer -= dt;
        if (!en.patrolTarget || en.patrolTimer <= 0 || Math.hypot((en.patrolTarget.x||0) - en.x, (en.patrolTarget.y||0) - en.y) < 0.5) {
          en.patrolTarget = randomFreeCell(); en.patrolTimer = 4 + Math.random() * 4;
        }
        if (en.patrolTarget) {
          const pdx = en.patrolTarget.x - en.x, pdy = en.patrolTarget.y - en.y; const pDist = Math.hypot(pdx, pdy);
          if (pDist > 0.1) { const pAng = Math.atan2(pdy, pdx); moveX = Math.cos(pAng) * enemyScale.speed * 0.4 * dt; moveY = Math.sin(pAng) * enemyScale.speed * 0.4 * dt; }
        }
      }
      if (moveX !== 0) {
        const nx = en.x + moveX;
        if (!isWall(nx + Math.sign(moveX) * ENEMY_RADIUS, en.y + ENEMY_RADIUS) && !isWall(nx + Math.sign(moveX) * ENEMY_RADIUS, en.y - ENEMY_RADIUS)) en.x = nx;
        else en.patrolTarget = null;
      }
      if (moveY !== 0) {
        const ny = en.y + moveY;
        if (!isWall(en.x + ENEMY_RADIUS, ny + Math.sign(moveY) * ENEMY_RADIUS) && !isWall(en.x - ENEMY_RADIUS, ny + Math.sign(moveY) * ENEMY_RADIUS)) en.y = ny;
        else en.patrolTarget = null;
      }
      return; // ShooterEnemy는 근접 공격 로직 생략
    }

    //---/// BossEnemy 전용 AI ///---
    if (en.isBoss) {
      const BOSS_R = 0.5;
      const ARENA_ENGAGE_DIST = 8.0;

      //---/// 진입 감지: 한 번 들어오면 영구 추적 ///---
      if (!en._engaged && dist < ARENA_ENGAGE_DIST) en._engaged = true;

      if (en.invulnTimer > 0) en.invulnTimer = Math.max(0, en.invulnTimer - dt);

      //---/// 페이즈 2: 도주 -> 포탈 3개 분산 생성 -> 잡몹 소환 -> 대기 ///---
      if (en._regenPhase) {
        
        // 1단계: 맵 중앙으로 이동
        if (en._retreating) {
          const tdx = en._retreatTarget.x - en.x;
          const tdy = en._retreatTarget.y - en.y;
          const tdist = Math.hypot(tdx, tdy);
          
          en._retreatTimer = (en._retreatTimer || 0) + dt;
          
          if (tdist > 1.5) {
            const spd = en.getSpeed() * 3.5; 
            const nx = en.x + (tdx/tdist) * spd * dt;
            const ny = en.y + (tdy/tdist) * spd * dt;
            
            if (!isWall(nx + Math.sign(tdx) * BOSS_R, en.y)) en.x = nx;
            if (!isWall(en.x, ny + Math.sign(tdy) * BOSS_R)) en.y = ny;
            
            if (Math.random() < dt * 15) cappedPush(particles, PERF_CAP_PARTICLES, { x: en.x, y: en.y, vx: 0, vy: 0, life: 0.4, color: '#aa0000' });
          } 
          
          if (tdist <= 1.5 || en._retreatTimer > 3.0) {
            en._retreating = false;
            en._spawningMinions = true;
            en._minionsToSpawn = 10 + Math.floor(Math.random() * 5); // 10~14마리 배정
            en._spawnTimer = 0.5; 
            en._retreatTimer = 0;
            
            // [NEW] 보스 주변으로 3개의 포탈을 삼각형 형태로 분산 생성!
            en._unholyPortals = [];
            for(let i = 0; i < 3; i++) {
              const ang = (i / 3) * Math.PI * 2 + (Math.random() * 0.5);
              let px = en.x + Math.cos(ang) * 3.5;
              let py = en.y + Math.sin(ang) * 3.5;
              
              // 혹시 포탈 위치가 벽 안쪽이면 보스 근처로 당김
              if (isWall(px, py)) { px = en.x + Math.cos(ang)*1.5; py = en.y + Math.sin(ang)*1.5; }
              
              // 포탈을 진짜 적(Entity) 배열에 추가하여 맵 전체에서 독립적으로 렌더링되게 만듦
              const pObj = { x: px, y: py, scale: 0, active: true, isUnholyPortal: true, hp: 99999, hitFlash: 0 };
              enemies.push(pObj);
              en._unholyPortals.push(pObj);
            }
          }
        } 
        // 2단계: 3개의 포탈에서 몬스터 무작위 소환
        else if (en._spawningMinions) {
          if (en._minionsToSpawn > 0) {
            en._unholyPortals.forEach(p => { if (p.scale < 1) p.scale = Math.min(1, p.scale + dt * 2); });
          }
          
          en._spawnTimer -= dt;
          if (en._spawnTimer <= 0 && en._minionsToSpawn > 0) {
            en._spawnTimer = 0.5; 
            en._minionsToSpawn--;
            
            // 활성화된 3개 포탈 중 무작위 하나를 골라 그곳에서 스폰
            const activePortals = en._unholyPortals.filter(p => p.scale > 0.5);
            const spawnP = activePortals.length > 0 ? activePortals[Math.floor(Math.random() * activePortals.length)] : en;
            
            const spawnX = spawnP.x;
            const spawnY = spawnP.y;
            
            if (en._minionsToSpawn % 3 === 2) enemies.push(new ShooterEnemy(spawnX, spawnY));
            else enemies.push(new Enemy(spawnX, spawnY));
            
            for(let i=0; i<8; i++) {
              const ang = Math.random() * Math.PI * 2;
              cappedPush(particles, PERF_CAP_PARTICLES, { x: spawnX, y: spawnY, vx: Math.cos(ang)*4, vy: Math.sin(ang)*4, life: 0.5, color: '#ff0000' });
            }
          }
          
          if (en._minionsToSpawn <= 0) {
            // 소환 끝, 모든 포탈 닫기
            let allClosed = true;
            en._unholyPortals.forEach(p => {
              p.scale -= dt * 2;
              if (p.scale > 0) allClosed = false;
              else p.active = false; // 크기가 0이 되면 엔진에서 자동 삭제
            });
            
            if (allClosed) {
              en._unholyPortals = null;
              en._spawningMinions = false;
              en._waitingMinions = true; 
            }
          }
        } 
        // 3단계: 소환된 하수인 전멸 대기
        else if (en._waitingMinions) {
          const minionsLeft = enemies.filter(e => !e.isBoss && !e.isMerchant && !e.isUnholyPortal && e.active && e.hp > 0).length;
          if (minionsLeft === 0) en._waitingMinions = false;
        }

        // 체력 서서히 재생
        if (en.hp < en.maxHp) {
          en._regenTimer += dt;
          const regenFrac = Math.min(1, en._regenTimer / en._regenDuration);
          en.hp = Math.max(1, Math.round(en.maxHp * regenFrac));
          en.hitFlash = Math.max(en.hitFlash - dt * 2, 0);
          
          if (Math.random() < dt * 8) {
            const ang2 = Math.random() * Math.PI * 2;
            cappedPush(particles, PERF_CAP_PARTICLES, { x: en.x + Math.cos(ang2)*0.4, y: en.y + Math.sin(ang2)*0.4, vx: Math.cos(ang2)*0.3, vy: Math.sin(ang2)*0.3 - 0.5, life: 0.5 + Math.random()*0.3, color: Math.random() < 0.5 ? '#ff4444' : '#aa0000' });
          }
        }
        
        // 4단계: 2페이즈 시작
        if (!en._retreating && !en._spawningMinions && !en._waitingMinions && en.hp >= en.maxHp) {
          en._regenPhase = false;
          en.phase = 2; 
          en.invulnTimer = 1.5;
        }
        
        return;
      }

      //---/// 잡몹 대기 중 ///---
      if (en._waitingMinions) {
        const minionsLeft = enemies.filter(e => !e.isBoss && e.active && e.hp > 0).length;
        if (minionsLeft === 0) {
          en._waitingMinions = false;
          en.phase = 2; en.invulnTimer = 1.5;
        } else {
          //---/// 대기 중엔 중심에서 제자리 ///---
          en.hitFlash = Math.max(en.hitFlash - dt * 2, 0);
          return;
        }
      }

      //---/// 미진입 시 대기 ///---
      if (!en._engaged) return;

      //---/// [NEW] 보스 패턴 캐스팅 제어 ///---
      en.castTimer = (en.castTimer || 0) - dt;
      if (en.invulnTimer <= 0) en.shootCooldown -= dt; 

      let isCasting = en.castTimer > 0;
      const spd = isCasting ? 0 : en.getSpeed(); // 캐스팅 중엔 우뚝 멈춤
      const ang = Math.atan2(dy, dx);

      //---/// 이동 ///---
      if (!isCasting && en.invulnTimer <= 0 && dist > BOSS_R + PLAYER_RADIUS) {
        const nx = en.x + Math.cos(ang) * spd * dt;
        const ny = en.y + Math.sin(ang) * spd * dt;
        if (!isWall(nx + Math.sign(Math.cos(ang)) * BOSS_R, en.y + BOSS_R) &&
            !isWall(nx + Math.sign(Math.cos(ang)) * BOSS_R, en.y - BOSS_R)) en.x = nx;
        if (!isWall(en.x + BOSS_R, ny + Math.sign(Math.sin(ang)) * BOSS_R) &&
            !isWall(en.x - BOSS_R, ny + Math.sign(Math.sin(ang)) * BOSS_R)) en.y = ny;
      }

      //---/// 근접 충돌 밀기 + 타격 (캐스팅 중이어도 몸통 박치기는 유효) ///---
      const minDistB = BOSS_R + PLAYER_RADIUS;
      if (en.invulnTimer <= 0 && dist < minDistB && dist > 0.001) {
        const push = (minDistB - dist) / dist;
        if (!isWall(player.x + dx * push * 0.5, player.y)) player.x += dx * push * 0.5;
        if (!isWall(player.x, player.y + dy * push * 0.5)) player.y += dy * push * 0.5;
      }
      if (dist < minDistB + 0.3) {
        if (!en.inContact) { en.attackCooldown = 0; en.inContact = true; }
        en.attackCooldown -= dt;
        if (en.attackCooldown <= 0) {
          const cdMult = en.phase === 2 ? 0.6 : 1.0;
          en.attackCooldown = enemyScale.atkCooldown * cdMult * (0.7 + Math.random() * 0.3);
          const dmgMult = en.phase === 2 ? 1.8 : 1.2;
          const dmg = Math.round(enemyScale.dmg * dmgMult);
          const absorbed = Math.min(state.armor, Math.floor(dmg / 2));
          state.armor -= absorbed; state.health -= (dmg - absorbed);
          damageFlashAlpha = 0.7;
          damageIndicators.push({ angle: Math.atan2(en.y - player.y, en.x - player.x), alpha: 1.0 });
          sndPlayerHit();
          if (state.health <= 0) { state.health = 0; state.dead = true; } markHUDDirty();
        }
      } else { en.inContact = false; }

      //---/// 패턴 선택 및 발동 ///---
      if (canSeePlayer && en.invulnTimer <= 0 && en.shootCooldown <= 0 && !isCasting) {
        en.shootCooldown = en.phase === 2 ? 2.5 : 3.5;
        en.castTimer = 0.8; // 0.8초 동안 기를 모음
        en.castType = Math.random() < 0.5 ? 'slash' : 'aoe'; 
        en.castAng = ang; // 기 모으기 시작할 때의 플레이어 방향
        
        // [NEW] 검기일 경우, 기를 모으기 시작할 때 미리 경로를 계산해둡니다 (경고선 용도)
        if (en.castType === 'slash') {
          en.slashAngles = [];
          const slashCount = en.phase === 2 ? 5 : 3;
          const spread = Math.PI / 6;
          const startOffset = -spread * Math.floor(slashCount / 2);
          for (let s = 0; s < slashCount; s++) {
            en.slashAngles.push(en.castAng + startOffset + s * spread);
          }
        }

        // 보스 기모으는 시각적 피드백
        en.hitFlash = 0.8;
      }

      // 기 모으기가 끝나면 발동
      if (en.castType && en.castTimer <= 0) {
        if (en.castType === 'slash') {
          // [NEW] 미리 계산해둔 경로(en.slashAngles)를 따라 검기 발사
          en.slashAngles.forEach(a => {
            cappedPush(enemyBullets, PERF_CAP_ENEMY_BULLETS, { x: en.x, y: en.y, vx: Math.cos(a) * 7.0, vy: Math.sin(a) * 7.0, life: 2.0, shooter: en, isSlash: true, angle: a });
          });
        } else if (en.castType === 'aoe') {
          // 장판 생성
          const aoeCount = en.phase === 2 ? 4 : 2;
          for (let i = 0; i < aoeCount; i++) {
            const ox = i === 0 ? 0 : (Math.random() - 0.5) * 8; // 퍼지는 범위 증가
            const oy = i === 0 ? 0 : (Math.random() - 0.5) * 8;
            // 반경(r)을 4.5로 대폭 증가
            cappedPush(bossAoes, PERF_CAP_BOSS_AOES, { x: player.x + ox, y: player.y + oy, life: 2.0, maxLife: 2.0, r: 4.5, triggered: false });
          }
        }
        en.castType = null;
      }
      return;
    }

    //---/// ████ BRUTE AI ████ ///---
    if (en.isBrute) {
      const bruteSpeed = enemyScale.speed * 0.7 * (en._enraged ? 1.3 : 1.0) * (en._charging ? 0 : 1);

      // 격분 조건: 체력 50% 이하
      if (!en._enraged && en.hp < en.maxHp * 0.5) {
        en._enraged = true;
        for (let i = 0; i < 12; i++) {
          const a2 = Math.random() * Math.PI * 2;
          cappedPush(particles, PERF_CAP_PARTICLES, { x: en.x, y: en.y, vx: Math.cos(a2)*4, vy: Math.sin(a2)*4, life: 0.4, color: '#ff2200' });
        }
      }

      // 체력 50% 이하 시 히트플래시 기저값 유지
      if (en._enraged) en.hitFlash = Math.max(en.hitFlash, 0.25);

      // 차지 쿨타임 감소
      if (en._chargeCooldown > 0) en._chargeCooldown -= dt;

      // 차지 경고 처리
      if (en._chargeTimer > 0) {
        en._chargeTimer -= dt;
        if (en._chargeTimer <= 0) {
          // 돌진 시작
          const ca = Math.atan2(player.y - en.y, player.x - en.x);
          en._chargeVX = Math.cos(ca) * 12;
          en._chargeVY = Math.sin(ca) * 12;
          en._charging = true;
          en._chargeDist = 0;
        }
        // 경고 중 파티클
        if (Math.random() < dt * 20) {
          cappedPush(particles, PERF_CAP_PARTICLES, { x: en.x + (Math.random()-0.5)*0.4, y: en.y + (Math.random()-0.5)*0.4,
            vx: 0, vy: -1.5, life: 0.25, color: '#ffcc00' });
        }
      }

      // 돌진 처리
      if (en._charging) {
        const nx = en.x + en._chargeVX * dt;
        const ny = en.y + en._chargeVY * dt;
        en._chargeDist = (en._chargeDist || 0) + Math.hypot(en._chargeVX * dt, en._chargeVY * dt);
        let hitWall = false;
        if (!isWall(nx + Math.sign(en._chargeVX) * 0.45, en.y) && !isWall(nx + Math.sign(en._chargeVX) * 0.45, en.y)) en.x = nx;
        else hitWall = true;
        if (!isWall(en.x, ny + Math.sign(en._chargeVY) * 0.45)) en.y = ny;
        else hitWall = true;

        if (hitWall) {
          // 벽 충돌 → 기절
          en._charging = false; en.stunTimer = 0.5; en._chargeCooldown = 4.0;
        } else if (en._chargeDist > 6.0) {
          en._charging = false; en._chargeCooldown = 3.0 + Math.random() * 2.0;
        }

        // 돌진 중 플레이어 충돌
        if (Math.hypot(player.x - en.x, player.y - en.y) < 0.6) {
          const dmg2 = Math.round(enemyScale.dmg * 1.8);
          const absorbed2 = Math.min(state.armor, Math.floor(dmg2 / 2));
          state.armor -= absorbed2; state.health -= (dmg2 - absorbed2);
          const kAng = Math.atan2(player.y - en.y, player.x - en.x);
          player.kbVX = Math.cos(kAng) * 12; player.kbVY = Math.sin(kAng) * 12; player.kbActive = 0.25;
          damageFlashAlpha = 0.7; sndPlayerHit();
          if (state.health <= 0) { state.health = 0; state.dead = true; } markHUDDirty();
          en._charging = false; en._chargeCooldown = 3.0;
        }
        return;
      }

      // 차지 발동 조건: 시야 확보 + 거리 6 이하 + 쿨타임 완료
      if (en.state === 'chase' && canSeePlayer && dist < 6.0 && en._chargeCooldown <= 0 && en._chargeTimer <= 0) {
        en._chargeTimer = 0.8; // 0.8초 경고
        en._chargeCooldown = 999; // 발동 중
      }

      // 일반 이동 (Brute)
      let moveX = 0, moveY = 0;
      if (en.state === 'chase' && dist > 0.45 + PLAYER_RADIUS) {
        const a2 = Math.atan2(dy, dx);
        moveX = Math.cos(a2) * bruteSpeed * dt;
        moveY = Math.sin(a2) * bruteSpeed * dt;
      } else if (en.state === 'patrol') {
        en.patrolTimer -= dt;
        if (!en.patrolTarget || en.patrolTimer <= 0 || Math.hypot(en.patrolTarget.x - en.x, en.patrolTarget.y - en.y) < 0.5)
          { en.patrolTarget = randomFreeCell(); en.patrolTimer = 4 + Math.random() * 4; }
        if (en.patrolTarget) {
          const pdx2 = en.patrolTarget.x - en.x, pdy2 = en.patrolTarget.y - en.y;
          if (Math.hypot(pdx2,pdy2) > 0.1) { const a2 = Math.atan2(pdy2,pdx2); moveX = Math.cos(a2)*bruteSpeed*0.45*dt; moveY = Math.sin(a2)*bruteSpeed*0.45*dt; }
        }
      }
      const BR = 0.45;
      if (moveX !== 0) { const nx = en.x + moveX; if (!isWall(nx+Math.sign(moveX)*BR, en.y+BR) && !isWall(nx+Math.sign(moveX)*BR, en.y-BR)) en.x = nx; else en.patrolTarget = null; }
      if (moveY !== 0) { const ny = en.y + moveY; if (!isWall(en.x+BR, ny+Math.sign(moveY)*BR) && !isWall(en.x-BR, ny+Math.sign(moveY)*BR)) en.y = ny; else en.patrolTarget = null; }

      // 근접 공격 (강한 넉백)
      const bruteDist = 0.45 + PLAYER_RADIUS;
      if (dist < bruteDist + 0.2) {
        if (!en.inContact) { en.attackCooldown = 0; en.inContact = true; }
        en.attackCooldown -= dt;
        if (en.attackCooldown <= 0) {
          en.attackCooldown = enemyScale.atkCooldown * 0.6 * (0.8 + Math.random() * 0.4);
          const dmg3 = Math.round(enemyScale.dmg * 1.8);
          const abs3 = Math.min(state.armor, Math.floor(dmg3 / 2));
          state.armor -= abs3; state.health -= (dmg3 - abs3);
          const kAng2 = Math.atan2(dy, dx);
          player.kbVX = Math.cos(kAng2) * 8; player.kbVY = Math.sin(kAng2) * 8; player.kbActive = 0.2;
          damageFlashAlpha = 0.6; sndPlayerHit();
          if (state.health <= 0) { state.health = 0; state.dead = true; } markHUDDirty();
        }
      } else { en.inContact = false; }
      return;
    }

    //---/// ████ PHANTOM AI ████ ///---
    if (en.isPhantom) {
      const phantomSpeed = enemyScale.speed * 1.7;

      // 무적 프레임 감소
      if (en._invulnFrame > 0) en._invulnFrame = Math.max(0, en._invulnFrame - dt);

      // 블링크 타이머 감소
      if (en._blinkTimer > 0) en._blinkTimer = Math.max(0, en._blinkTimer - dt);

      // 잔상 파티클 (이동 중)
      en._trailTimer = (en._trailTimer || 0) - dt;
      if (en._trailTimer <= 0 && en.state === 'chase') {
        en._trailTimer = 0.06;
        cappedPush(particles, PERF_CAP_PARTICLES, { x: en.x, y: en.y, vx: 0, vy: 0, life: 0.18, color: 'rgba(100,0,200,0.6)' });
      }

      // 조준선 체크 → 블링크
      let diff2 = Math.atan2(dy, dx) - player.angle;
      while (diff2 > Math.PI) diff2 -= Math.PI * 2; while (diff2 < -Math.PI) diff2 += Math.PI * 2;
      if (en.state === 'chase' && Math.abs(diff2) < 0.12 && en._blinkTimer <= 0) {
        // 블링크
        for (let t2 = 0; t2 < 30; t2++) {
          const bx2 = en.x + (Math.random() - 0.5) * 6;
          const by2 = en.y + (Math.random() - 0.5) * 6;
          if (!isWall(bx2, by2) && Math.hypot(bx2 - player.x, by2 - player.y) > 2.0) {
            for (let i = 0; i < 8; i++) { const ba = Math.random()*Math.PI*2; cappedPush(particles, PERF_CAP_PARTICLES, { x: en.x, y: en.y, vx: Math.cos(ba)*3, vy: Math.sin(ba)*3, life: 0.2, color: '#6600cc' }); }
            en.x = bx2; en.y = by2;
            en._blinkTimer = 1.2;
            break;
          }
        }
      }

      let moveX = 0, moveY = 0;
      if (en.state === 'chase' && dist > ENEMY_RADIUS + PLAYER_RADIUS) {
        const a2 = Math.atan2(dy, dx); moveX = Math.cos(a2)*phantomSpeed*dt; moveY = Math.sin(a2)*phantomSpeed*dt;
      } else if (en.state === 'patrol') {
        en.patrolTimer -= dt;
        if (!en.patrolTarget || en.patrolTimer <= 0 || Math.hypot(en.patrolTarget.x-en.x, en.patrolTarget.y-en.y) < 0.5)
          { en.patrolTarget = randomFreeCell(); en.patrolTimer = 4+Math.random()*4; }
        if (en.patrolTarget) {
          const pdx2=en.patrolTarget.x-en.x, pdy2=en.patrolTarget.y-en.y;
          if (Math.hypot(pdx2,pdy2) > 0.1) { const a2=Math.atan2(pdy2,pdx2); moveX=Math.cos(a2)*phantomSpeed*0.45*dt; moveY=Math.sin(a2)*phantomSpeed*0.45*dt; }
        }
      }
      if (moveX !== 0) { const nx=en.x+moveX; if (!isWall(nx+Math.sign(moveX)*ENEMY_RADIUS, en.y+ENEMY_RADIUS) && !isWall(nx+Math.sign(moveX)*ENEMY_RADIUS, en.y-ENEMY_RADIUS)) en.x=nx; else en.patrolTarget=null; }
      if (moveY !== 0) { const ny=en.y+moveY; if (!isWall(en.x+ENEMY_RADIUS, ny+Math.sign(moveY)*ENEMY_RADIUS) && !isWall(en.x-ENEMY_RADIUS, ny+Math.sign(moveY)*ENEMY_RADIUS)) en.y=ny; else en.patrolTarget=null; }

      const minDist2 = ENEMY_RADIUS + PLAYER_RADIUS;
      if (dist < minDist2 + 0.2) {
        if (!en.inContact) { en.attackCooldown = 0; en.inContact = true; }
        en.attackCooldown -= dt;
        if (en.attackCooldown <= 0) {
          en.attackCooldown = enemyScale.atkCooldown * (0.8 + Math.random() * 0.4);
          const dmg4 = Math.round(enemyScale.dmg * 1.2);
          const abs4 = Math.min(state.armor, Math.floor(dmg4 / 2));
          state.armor -= abs4; state.health -= (dmg4 - abs4);
          damageFlashAlpha = 0.6; sndPlayerHit();
          if (state.health <= 0) { state.health = 0; state.dead = true; } markHUDDirty();
        }
      } else { en.inContact = false; }
      return;
    }

    //---/// ████ SCREAMER AI ████ ///---
    if (en.isScreamer) {
      let moveX = 0, moveY = 0;

      if (canSeePlayer) en._activated = true;
      if (en._activated) {
        en._summonTimer -= dt;
        if (en._summonTimer <= 0) {
          en._summonTimer = en._summonCooldown;
          en._summonWave = 1.0;
          let spawned = 0;
          for (let s = 0; s < 8 && spawned < 2; s++) {
            if (randomSpawnMonsterByScreamer(en.x, en.y)) spawned++;
          }
          sndEnemyHit();
        }
      }

      if (en.state === 'chase') {
        const FLEE_DIST = 3.5;
        const a2 = Math.atan2(dy, dx);
        if (dist < FLEE_DIST) {
          moveX = -Math.cos(a2) * enemyScale.speed * 1.1 * dt;
          moveY = -Math.sin(a2) * enemyScale.speed * 1.1 * dt;
        } else {
          moveX = Math.cos(a2) * enemyScale.speed * 0.3 * dt;
          moveY = Math.sin(a2) * enemyScale.speed * 0.3 * dt;
        }
      } else if (en.state === 'patrol') {
        en.patrolTimer -= dt;
        if (!en.patrolTarget || en.patrolTimer <= 0 || Math.hypot(en.patrolTarget.x-en.x, en.patrolTarget.y-en.y) < 0.5)
          { en.patrolTarget = randomFreeCell(); en.patrolTimer = 4+Math.random()*4; }
        if (en.patrolTarget) {
          const pdx2=en.patrolTarget.x-en.x, pdy2=en.patrolTarget.y-en.y;
          if (Math.hypot(pdx2,pdy2) > 0.1) { const a2=Math.atan2(pdy2,pdx2); moveX=Math.cos(a2)*enemyScale.speed*0.35*dt; moveY=Math.sin(a2)*enemyScale.speed*0.35*dt; }
        }
      }

      if (moveX !== 0) { const nx=en.x+moveX; if (!isWall(nx+Math.sign(moveX)*ENEMY_RADIUS, en.y+ENEMY_RADIUS) && !isWall(nx+Math.sign(moveX)*ENEMY_RADIUS, en.y-ENEMY_RADIUS)) en.x=nx; else en.patrolTarget=null; }
      if (moveY !== 0) { const ny=en.y+moveY; if (!isWall(en.x+ENEMY_RADIUS, ny+Math.sign(moveY)*ENEMY_RADIUS) && !isWall(en.x-ENEMY_RADIUS, ny+Math.sign(moveY)*ENEMY_RADIUS)) en.y=ny; else en.patrolTarget=null; }

      const minDist2 = ENEMY_RADIUS + PLAYER_RADIUS;
      if (dist < minDist2 + 0.2) {
        if (!en.inContact) { en.attackCooldown = 0; en.inContact = true; }
        en.attackCooldown -= dt;
        if (en.attackCooldown <= 0) {
          en.attackCooldown = enemyScale.atkCooldown * (0.8 + Math.random() * 0.4);
          const dmg4 = Math.round(enemyScale.dmg * 1.2);
          const abs4 = Math.min(state.armor, Math.floor(dmg4 / 2));
          state.armor -= abs4; state.health -= (dmg4 - abs4);
          damageFlashAlpha = 0.6; sndPlayerHit();
          if (state.health <= 0) { state.health = 0; state.dead = true; } markHUDDirty();
        }
      } else { en.inContact = false; }
      return;
    }

    //---/// ████ IRONCLAD AI ████ ///---
    if (en.isIronclad) {
      const ironcladSpeed = enemyScale.speed * 0.65 * (en._enraged ? 1.5 : 1.0);
      const ironcladAtkCd = enemyScale.atkCooldown * 0.8 * (en._enraged ? 0.5 : 1.0);

      let moveX = 0, moveY = 0;
      if (en.state === 'chase' && dist > 0.45 + PLAYER_RADIUS) {
        const a2 = Math.atan2(dy, dx); moveX = Math.cos(a2)*ironcladSpeed*dt; moveY = Math.sin(a2)*ironcladSpeed*dt;
      } else if (en.state === 'patrol') {
        en.patrolTimer -= dt;
        if (!en.patrolTarget || en.patrolTimer <= 0 || Math.hypot(en.patrolTarget.x-en.x, en.patrolTarget.y-en.y)<0.5)
          { en.patrolTarget = randomFreeCell(); en.patrolTimer = 4+Math.random()*4; }
        if (en.patrolTarget) {
          const pdx2=en.patrolTarget.x-en.x, pdy2=en.patrolTarget.y-en.y;
          if (Math.hypot(pdx2,pdy2)>0.1) { const a2=Math.atan2(pdy2,pdx2); moveX=Math.cos(a2)*ironcladSpeed*0.45*dt; moveY=Math.sin(a2)*ironcladSpeed*0.45*dt; }
        }
      }
      const IR = 0.45;
      if (moveX !== 0) { const nx=en.x+moveX; if (!isWall(nx+Math.sign(moveX)*IR, en.y+IR) && !isWall(nx+Math.sign(moveX)*IR, en.y-IR)) en.x=nx; else en.patrolTarget=null; }
      if (moveY !== 0) { const ny=en.y+moveY; if (!isWall(en.x+IR, ny+Math.sign(moveY)*IR) && !isWall(en.x-IR, ny+Math.sign(moveY)*IR)) en.y=ny; else en.patrolTarget=null; }

      if (dist < IR + PLAYER_RADIUS + 0.2) {
        if (!en.inContact) { en.attackCooldown = 0; en.inContact = true; }
        en.attackCooldown -= dt;
        if (en.attackCooldown <= 0) {
          en.attackCooldown = ironcladAtkCd * (0.8 + Math.random() * 0.4);
          const dmg6 = Math.round(enemyScale.dmg * 2.0);
          const abs6 = Math.min(state.armor, Math.floor(dmg6 / 2));
          state.armor -= abs6; state.health -= (dmg6 - abs6);
          damageFlashAlpha = 0.7; sndPlayerHit();
          if (state.health <= 0) { state.health = 0; state.dead = true; } markHUDDirty();
        }
      } else { en.inContact = false; }
      return;
    }

    let moveX = 0, moveY = 0;
    if (en.state === 'chase' && dist > ENEMY_RADIUS + PLAYER_RADIUS) {
      //---/// 스크리머 속도 버프 적용 ///---
      const screamMult = en._screamBuff > 0 ? 1.4 : 1.0;
      if (en._screamBuff > 0) en._screamBuff = Math.max(0, en._screamBuff - dt);
      const ang = Math.atan2(dy, dx); moveX = Math.cos(ang) * enemyScale.speed * screamMult * dt; moveY = Math.sin(ang) * enemyScale.speed * screamMult * dt;
    } else if (en.state === 'patrol') {
      en.patrolTimer -= dt;
      if (!en.patrolTarget || en.patrolTimer <= 0 || Math.hypot(en.patrolTarget.x - en.x, en.patrolTarget.y - en.y) < 0.5) {
        en.patrolTarget = randomFreeCell(); en.patrolTimer = 4 + Math.random() * 4;
      }
      if (en.patrolTarget) {
        const pdx = en.patrolTarget.x - en.x, pdy = en.patrolTarget.y - en.y; const pDist = Math.hypot(pdx, pdy);
        if (pDist > 0.1) { const ang = Math.atan2(pdy, pdx); moveX = Math.cos(ang) * enemyScale.speed * 0.45 * dt; moveY = Math.sin(ang) * enemyScale.speed * 0.45 * dt; }
      }
    }
    if (moveX !== 0) {
      const nx = en.x + moveX;
      if (!isWall(nx + Math.sign(moveX) * ENEMY_RADIUS, en.y + ENEMY_RADIUS) && !isWall(nx + Math.sign(moveX) * ENEMY_RADIUS, en.y - ENEMY_RADIUS)) en.x = nx;
      else if (en.state === 'patrol') en.patrolTarget = null;
    }
    if (moveY !== 0) {
      const ny = en.y + moveY;
      if (!isWall(en.x + ENEMY_RADIUS, ny + Math.sign(moveY) * ENEMY_RADIUS) && !isWall(en.x - ENEMY_RADIUS, ny + Math.sign(moveY) * ENEMY_RADIUS)) en.y = ny;
      else if (en.state === 'patrol') en.patrolTarget = null;
    }
    //---/// 몬스터 발소리 — 가까운 적만, 글로벌 쿨다운 공유 ///---
    if ((moveX !== 0 || moveY !== 0) && dist < 4.5) {
      en.stepTimer = (en.stepTimer || 0) - dt;
      if (en.stepTimer <= 0) {
        tryEnemyFootstep(en);
        en.stepTimer = en.state === 'chase' ? 0.36 : 0.55;
      }
    }
    const enTileX = Math.floor(en.x), enTileY = Math.floor(en.y);
    for (let ty = enTileY - 1; ty <= enTileY + 1; ty++) {
      for (let tx = enTileX - 1; tx <= enTileX + 1; tx++) {
        if (tx < 0 || ty < 0 || tx >= MAP_W || ty >= MAP_H || !currentMap[ty][tx]) continue;
        const nearX = Math.max(tx, Math.min(tx + 1, en.x)), nearY = Math.max(ty, Math.min(ty + 1, en.y));
        const odx = en.x - nearX, ody = en.y - nearY; const od = Math.hypot(odx, ody);
        if (od < ENEMY_RADIUS && od > 0.0001) { const push = (ENEMY_RADIUS - od) / od; en.x += odx * push; en.y += ody * push; }
      }
    }
    const minDist = ENEMY_RADIUS + PLAYER_RADIUS;
    if (dist < minDist && dist > 0.001) {
      const push = (minDist - dist) / dist; const enPX = -dx * push * 0.5, enPY = -dy * push * 0.5; const plPX = dx * push * 0.5, plPY = dy * push * 0.5;
      if (!isWall(en.x + enPX, en.y)) en.x += enPX; if (!isWall(en.x, en.y + enPY)) en.y += enPY;
      if (!isWall(player.x + plPX, player.y)) player.x += plPX; if (!isWall(player.x, player.y + plPY)) player.y += plPY;
    }
    if (dist < minDist + 0.2) {
      //---/// 새로 접촉한 순간 쿨타임을 0으로 → 즉시 공격 후 쿨타임 시작 ///---
      if (!en.inContact) { en.attackCooldown = 0; en.inContact = true; }
      en.attackCooldown -= dt;
      if (en.attackCooldown <= 0) {
        en.attackCooldown = enemyScale.atkCooldown * (0.8 + Math.random() * 0.4);
        const dmg = enemyScale.dmg;
        const absorbed = Math.min(state.armor, Math.floor(dmg / 2));
        state.armor -= absorbed; state.health -= (dmg - absorbed); 
        
        damageFlashAlpha = 0.6; 
        const enemyAngle = Math.atan2(en.y - player.y, en.x - player.x);
        damageIndicators.push({ angle: enemyAngle, alpha: 1.0 });

        sndPlayerHit();
        if (state.health <= 0) { state.health = 0; state.dead = true; } markHUDDirty();
      }
    } else {
      en.inContact = false; // 접촉 해제 — 다음 접촉 시 다시 즉시 공격
    }
  });
  const MIN_EN = ENEMY_RADIUS * 2;
  for (let i = 0; i < enemies.length; i++) {
    if (enemies[i].hp <= 0) continue;
    for (let j = i + 1; j < enemies.length; j++) {
      if (enemies[j].hp <= 0) continue;
      const ex = enemies[j].x - enemies[i].x, ey = enemies[j].y - enemies[i].y; const ed = Math.hypot(ex, ey);
      if (ed < MIN_EN && ed > 0.001) {
        const push = (MIN_EN - ed) / ed * 0.5; const px = ex * push, py = ey * push;
        if (!isWall(enemies[i].x - px, enemies[i].y)) enemies[i].x -= px; if (!isWall(enemies[i].x, enemies[i].y - py)) enemies[i].y -= py;
        if (!isWall(enemies[j].x + px, enemies[j].y)) enemies[j].x += px; if (!isWall(enemies[j].x, enemies[j].y + py)) enemies[j].y += py;
      }
    }
  }
}

//---/// 적 총알 이동, 벽 충돌, 플레이어 피격 처리 ///---
function updateEnemyBullets(dt) {
  const BULLET_RADIUS = 0.12; const PLAYER_RADIUS = 0.32;
  
  let keepCount = 0; // 살아남은 총알 개수 추적
  for (let i = 0; i < enemyBullets.length; i++) {
    const b = enemyBullets[i];
    b.life -= dt;
    if (b.life <= 0) continue;
    
    b.x += b.vx * dt; b.y += b.vy * dt;
    if (isWall(b.x, b.y)) continue;
    
    if (b.reflected) {
      let hit = false;
      enemies.forEach(en => {
        if (hit || en.hp <= 0) return;
        if (Math.hypot(b.x - en.x, b.y - en.y) < BULLET_RADIUS + 0.323) {
          const rdmg = Math.round(enemyScale.dmg * 2 * gun.MELEE_MULT);
          applyDamage(en, rdmg, false, true, 'bullet'); // isPlayerAttack=true: 킬 보너스·마법 효과 적용
          applyMagicEffects(en);
          spawnBlood(en.x, en.y, 4);
          markHUDDirty();
          if (b.pierce > 0) b.pierce--;
          else hit = true;
        }
      });
      if (hit) continue;
    }
    
    const currentRadius = b.isSlash ? 0.4 : BULLET_RADIUS;
    if (!b.reflected && Math.hypot(b.x - player.x, b.y - player.y) < currentRadius + PLAYER_RADIUS) {
      const dmg = Math.round(enemyScale.dmg * (b.isSlash ? 1.5 : 0.7));
      const absorbed = Math.min(state.armor, Math.floor(dmg / 2));
      state.armor -= absorbed; state.health -= (dmg - absorbed);
      damageFlashAlpha = 0.5;
      damageIndicators.push({ angle: Math.atan2(b.y - player.y, b.x - player.x), alpha: 1.0 });
      sndPlayerHit();
      if (state.health <= 0) { state.health = 0; state.dead = true; }
      markHUDDirty();
      continue;
    }
    
    let ffHit = false;
    enemies.forEach(en => {
      if (ffHit || en.hp <= 0 || en === b.shooter) return;
      if (Math.hypot(b.x - en.x, b.y - en.y) < BULLET_RADIUS + 0.323) {
        const dmg = Math.round(enemyScale.dmg * 0.7);
        applyDamage(en, dmg);
        spawnBlood(en.x, en.y, 3);
        markHUDDirty();
        if (b.pierce > 0) b.pierce--;
        else ffHit = true;
      }
    });
    if (ffHit) continue;
    
    // 조건에 맞는 경우만 배열 앞쪽으로 옮겨 덮어쓰기
    enemyBullets[keepCount++] = b;
  }
  // 실제 살아남은 길이만큼 배열 자르기 (새 배열 생성 안 함)
  enemyBullets.length = keepCount;
}

function updateBossAoes(dt) {
  let keepCount = 0;
  for (let i = 0; i < bossAoes.length; i++) {
    const a = bossAoes[i];
    a.life -= dt;
    
    if (a.life < 0.2 && !a.triggered) {
      a.triggered = true;
      if (Math.hypot(a.x - player.x, a.y - player.y) < a.r) {
        const dmg = Math.round(enemyScale.dmg * 1.5); 
        const absorbed = Math.min(state.armor, Math.floor(dmg / 2));
        state.armor -= absorbed; state.health -= (dmg - absorbed);
        damageFlashAlpha = 0.8;
        damageIndicators.push({ angle: Math.atan2(a.y - player.y, a.x - player.x), alpha: 1.0 });
        sndPlayerHit();
        if (state.health <= 0) { state.health = 0; state.dead = true; } markHUDDirty();
      }
      skyStrikes.push({ x: a.x, y: a.y, life: 0.4 });
      sndShoot('thunder');
      for(let j=0; j<20; j++) {
         const ang = Math.random() * Math.PI * 2;
         const spd = 3 + Math.random() * 5;
         cappedPush(particles, PERF_CAP_PARTICLES, { x: a.x, y: a.y, vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd, life: 0.3+Math.random()*0.3, color: Math.random()<0.5?'#ff0000':'#880000' });
      }
    }
    if (a.life > 0) bossAoes[keepCount++] = a;
  }
  bossAoes.length = keepCount;
}

function updateItems(dt) {
  items.forEach(it => {
    if (!it.active) return;
    //---/// 호밍 모드: 벽 무시하고 플레이어를 향해 고속 이동 ///---
    if (it.homing) {
      const dx = player.x - it.x, dy = player.y - it.y;
      const dist = Math.hypot(dx, dy);
      if (dist < 0.5) {
        //---/// 플레이어 도달 시 습득 ///---
        it.active = false;
        if (it.type === 'health') {
          if (state.health >= 100) state.score += 150;
          else state.health = Math.min(100, state.health + 25);
          state.score += 25;
        }
        if (it.type === 'armor') {
        if (state.armor >= state.maxArmor) { state.score += 120; }
        else { state.armor = Math.min(state.maxArmor, state.armor + 25); }
        state.score += 20;
        }
        if (it.type === 'ammo') { gun.mags = Math.min(gun.mags + 1, 9); state.score += 15; }
        state.exp += Math.floor(state.maxExp * 0.01);
        if (state.exp >= state.maxExp) {
          state.level++; state.exp -= state.maxExp;
          state.maxExp = Math.floor(state.maxExp * 1.3);
          applyLevelUpBonus();
          state.pendingUpgrades++;
        }
        markHUDDirty();
        return;
      }
      //---/// 고속 직선 이동 (벽 무시) ///---
      const HOMING_SPEED = 7;
      it.x += (dx / dist) * HOMING_SPEED * dt;
      it.y += (dy / dist) * HOMING_SPEED * dt;
      it.bob += 0.15;
      return;
    }
    //---/// 일반 모드: 접촉 시 습득 ///---
    if (Math.hypot(it.x - player.x, it.y - player.y) < 1.2) {
      it.active = false;
      if (it.type === 'health') {
        if (state.health >= 100) { state.score += 150; }
        else { state.health = Math.min(100, state.health + 25); }
        state.score += 25;
      }
      if (it.type === 'armor') {
        if (state.armor >= 50) { state.score += 120; }
        else { state.armor = Math.min(50, state.armor + 25); }
        state.score += 20;
      }
      if (it.type === 'ammo') { gun.mags = Math.min(gun.mags + 1, 9); state.score += 15; }
      //---/// 아이템 습득마다 현재 maxExp의 1% 경험치 지급 ///---
      state.exp += Math.floor(state.maxExp * 0.01);
      if (state.exp >= state.maxExp) {
        state.level++; state.exp -= state.maxExp;
        state.maxExp = Math.floor(state.maxExp * 1.3);
        applyLevelUpBonus();
        state.pendingUpgrades++;
      }
      markHUDDirty();
    }
    it.bob += 0.05;
  });
}

const ParticlePool = {
  pool: [],
  maxSize: 600,
  get: function(x, y, vx, vy, life, color) {
    if (this.pool.length > 0) {
      const p = this.pool.pop();
      p.x = x; p.y = y; p.vx = vx; p.vy = vy; 
      p.life = life; p.maxLife = life; p.color = color;
      p.isEmber = false; p.isAsh = false;
      return p;
    }
    return { x, y, vx, vy, life, maxLife: life, color, isEmber: false, isAsh: false };
  },
  release: function(p) {
    if (this.pool.length < this.maxSize) this.pool.push(p);
  }
};

const MAX_PARTICLES = 500; // [핵심 최적화] 파티클 상한 — 초과 시 오래된 것(앞쪽)부터 드롭
function updateParticles(dt) {
  let keepCount = 0;
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.isEmber) {
      p.vx *= 0.92;
      p.vy *= 0.92;
    }
    if (p.life > 0) {
      particles[keepCount++] = p;
    } else {
      ParticlePool.release(p); // 다 쓴 파티클을 삭제하는 대신 창고로 반납!
    }
  }
  particles.length = keepCount;
  // 상한 초과 시 수명이 가장 짧은(오래된) 파티클 앞쪽부터 드롭
  if (particles.length > MAX_PARTICLES) {
    const drop = particles.length - MAX_PARTICLES;
    for (let i = 0; i < drop; i++) ParticlePool.release(particles[i]);
    particles.splice(0, drop);
  }
}

function updateExplosionFX(dt) {
  // 1. 폭발 이펙트 배열 처리
  let keepCountExp = 0;
  for (let i = 0; i < explosionFX.length; i++) {
    const fx = explosionFX[i];
    const p = 1 - fx.life;
    fx.r = fx.maxR * (1 - Math.pow(1 - p, 4)); 
    fx.life -= dt * 2.5;
    if (fx.life > 0) explosionFX[keepCountExp++] = fx;
  }
  explosionFX.length = keepCountExp;
  
  // 2. 번개 라인 배열 처리
  let keepCountLight = 0;
  for (let i = 0; i < lightningLines.length; i++) {
    const l = lightningLines[i];
    l.life -= dt;
    if (l.life > 0) lightningLines[keepCountLight++] = l;
  }
  lightningLines.length = keepCountLight;
  
  // 3. 하늘 번개 배열 처리
  let keepCountSky = 0;
  for (let i = 0; i < skyStrikes.length; i++) {
    const s = skyStrikes[i];
    s.life -= dt;
    if (s.life > 0) skyStrikes[keepCountSky++] = s;
  }
  skyStrikes.length = keepCountSky;
}

function drawEnemyBody(en, screenX, spriteTop, spriteH, halfW, hitAlpha, dc) {
  dc = dc || ctx;

  // [NEW] 공통 헬퍼: 입체감을 위한 명암(Shading) 그리기
  function drawShading(x, y, w, h) {
    if (hitAlpha > 0) return; // 피격 중일 땐 명암 생략 (번쩍임 강조)
    dc.fillStyle = 'rgba(0,0,0,0.35)'; // 우측 어두움
    dc.fillRect(x + w*0.5, y, w*0.5, h);
    dc.fillStyle = 'rgba(255,255,255,0.15)'; // 좌측 밝음
    dc.fillRect(x, y, w*0.15, h);
  }

  //---/// 0. BOSS 렌더링 (도감 프리뷰용) ///---
  if (en.isBoss) {
    const isP2 = en.phase >= 2;
    const sc = isP2 ? 1.5 : 1.3;
    const breathe = 0;        // 도감: 숨쉬기 애니 정지
    const wingFlap = 0;       // 도감: 날개 퍼덕 정지
    const bodyC = hitAlpha > 0 ? `rgba(255,100,100,1)` : (isP2 ? '#400' : '#611');
    const skinC = hitAlpha > 0 ? `rgba(255,200,200,1)` : (isP2 ? '#711' : '#922');
    const hornC = hitAlpha > 0 ? '#ffaa00' : '#111';
    const eyeC  = hitAlpha > 0.5 ? '#fff' : (isP2 ? '#ffaa00' : '#ffdd00');

    // 날개
    dc.fillStyle = isP2 ? '#200' : '#311';
    const wingSpread = isP2 ? 1.8 : 1.3;
    dc.beginPath();
    dc.moveTo(screenX, spriteTop + spriteH*(1 - 0.6*sc));
    dc.lineTo(screenX - halfW*wingSpread*sc, spriteTop + spriteH*(1 - 1.0*sc) + spriteH*wingFlap);
    dc.lineTo(screenX - halfW*0.6*sc, spriteTop + spriteH*(1 - 0.3*sc));
    dc.moveTo(screenX, spriteTop + spriteH*(1 - 0.6*sc));
    dc.lineTo(screenX + halfW*wingSpread*sc, spriteTop + spriteH*(1 - 1.0*sc) + spriteH*wingFlap);
    dc.lineTo(screenX + halfW*0.6*sc, spriteTop + spriteH*(1 - 0.3*sc));
    dc.fill();

    // 뿔
    dc.strokeStyle = hornC;
    dc.lineWidth = halfW * 0.25 * sc;
    dc.lineCap = 'round';
    dc.beginPath();
    dc.moveTo(screenX - halfW*0.2*sc, spriteTop + spriteH*(1 - 0.9*sc) - spriteH*breathe);
    dc.quadraticCurveTo(screenX - halfW*0.8*sc, spriteTop + spriteH*(1 - 1.2*sc) - spriteH*breathe, screenX - halfW*1.0*sc, spriteTop + spriteH*(1 - 0.8*sc) - spriteH*breathe);
    dc.stroke();
    dc.beginPath();
    dc.moveTo(screenX + halfW*0.2*sc, spriteTop + spriteH*(1 - 0.9*sc) - spriteH*breathe);
    dc.quadraticCurveTo(screenX + halfW*0.8*sc, spriteTop + spriteH*(1 - 1.2*sc) - spriteH*breathe, screenX + halfW*1.0*sc, spriteTop + spriteH*(1 - 0.8*sc) - spriteH*breathe);
    dc.stroke();

    // 몸통
    dc.fillStyle = bodyC;
    dc.fillRect(screenX - halfW*0.7*sc, spriteTop + spriteH*(1 - 0.7*sc) - spriteH*breathe, halfW*1.4*sc, spriteH*0.45*sc);
    dc.fillStyle = skinC;
    dc.fillRect(screenX - halfW*0.5*sc, spriteTop + spriteH*(1 - 0.65*sc) - spriteH*breathe, halfW*0.4*sc, spriteH*0.2*sc);
    dc.fillRect(screenX + halfW*0.1*sc, spriteTop + spriteH*(1 - 0.65*sc) - spriteH*breathe, halfW*0.4*sc, spriteH*0.2*sc);

    // 머리 (180도 회전: dc.scale(-1,1) 후 그리고 복원)
    dc.save();
    dc.scale(-1, 1);
    const fx = -screenX; // 반전된 좌표계에서의 x
    dc.fillStyle = skinC;
    dc.fillRect(fx - halfW*0.4*sc, spriteTop + spriteH*(1 - 0.95*sc) - spriteH*breathe, halfW*0.8*sc, spriteH*0.3*sc);
    dc.fillStyle = eyeC;
    const eyeY = spriteTop + spriteH*(1 - 0.82*sc) - spriteH*breathe;
    dc.beginPath();
    dc.moveTo(fx - halfW*0.3*sc, eyeY - spriteH*0.02);
    dc.lineTo(fx - halfW*0.05*sc, eyeY + spriteH*0.04);
    dc.lineTo(fx - halfW*0.2*sc, eyeY + spriteH*0.06);
    dc.fill();
    dc.beginPath();
    dc.moveTo(fx + halfW*0.3*sc, eyeY - spriteH*0.02);
    dc.lineTo(fx + halfW*0.05*sc, eyeY + spriteH*0.04);
    dc.lineTo(fx + halfW*0.2*sc, eyeY + spriteH*0.06);
    dc.fill();
    dc.restore();

    // 하반신
    dc.fillStyle = '#111';
    dc.beginPath();
    dc.moveTo(screenX - halfW*0.5*sc, spriteTop + spriteH*(1 - 0.25*sc) - spriteH*breathe);
    dc.lineTo(screenX + halfW*0.5*sc, spriteTop + spriteH*(1 - 0.25*sc) - spriteH*breathe);
    dc.lineTo(screenX + halfW*0.3*sc, spriteTop + spriteH);
    dc.lineTo(screenX - halfW*0.3*sc, spriteTop + spriteH);
    dc.fill();
    return;
  }

  //---/// 1. BRUTE (브루트) 렌더링 ///---
  if (en.isBrute) {
    const walkAnim = en._codexStatic ? 0 : (en.frame === 0 ? spriteH*0.04 : -spriteH*0.04);
    const bodyC = hitAlpha > 0 ? `rgba(255,160,160,1)` : (en._enraged ? '#6a0a00' : '#8B2200');
    const skinC = hitAlpha > 0 ? '#fff' : '#a03010';
    const eyeC  = hitAlpha > 0.5 ? '#fff' : (en._enraged ? '#ffffff' : '#ff4400');
    
    // 다리 (두껍게)
    dc.fillStyle = '#111';
    dc.fillRect(screenX - halfW*0.4, spriteTop + spriteH*0.8 + walkAnim, halfW*0.35, spriteH*0.2);
    dc.fillRect(screenX + halfW*0.05, spriteTop + spriteH*0.8 - walkAnim, halfW*0.35, spriteH*0.2);
    
    // 몸통 (매우 큼)
    dc.fillStyle = bodyC;
    dc.fillRect(screenX - halfW*0.65, spriteTop + spriteH*0.35, halfW*1.3, spriteH*0.5);
    drawShading(screenX - halfW*0.65, spriteTop + spriteH*0.35, halfW*1.3, spriteH*0.5);

    // 흉터 / 핏줄 (격분 시 붉게 빛남)
    if (en._enraged && hitAlpha === 0) {
      dc.strokeStyle = '#ff2200'; dc.lineWidth = 2;
      dc.beginPath(); dc.moveTo(screenX - halfW*0.3, spriteTop + spriteH*0.4); dc.lineTo(screenX + halfW*0.2, spriteTop + spriteH*0.6); dc.stroke();
      dc.beginPath(); dc.moveTo(screenX + halfW*0.3, spriteTop + spriteH*0.45); dc.lineTo(screenX - halfW*0.1, spriteTop + spriteH*0.7); dc.stroke();
    }

    // 복부 갑옷 파츠
    dc.fillStyle = '#333';
    dc.fillRect(screenX - halfW*0.4, spriteTop + spriteH*0.65, halfW*0.8, spriteH*0.15);
    dc.fillStyle = '#555';
    for(let i=0; i<3; i++) dc.fillRect(screenX - halfW*0.3 + i*halfW*0.25, spriteTop + spriteH*0.65, halfW*0.1, spriteH*0.15);

    // 머리 & 금속 턱받이
    dc.fillStyle = skinC;
    dc.fillRect(screenX - halfW*0.4, spriteTop + spriteH*0.08 + walkAnim*0.3, halfW*0.8, spriteH*0.3);
    drawShading(screenX - halfW*0.4, spriteTop + spriteH*0.08 + walkAnim*0.3, halfW*0.8, spriteH*0.3);
    dc.fillStyle = '#222';
    dc.fillRect(screenX - halfW*0.45, spriteTop + spriteH*0.28 + walkAnim*0.3, halfW*0.9, spriteH*0.1);

    // 눈
    dc.fillStyle = eyeC;
    dc.fillRect(screenX - halfW*0.28, spriteTop + spriteH*0.16 + walkAnim*0.3, halfW*0.12, spriteH*0.09);
    dc.fillRect(screenX + halfW*0.08, spriteTop + spriteH*0.16 + walkAnim*0.3, halfW*0.12, spriteH*0.09);

    // 어깨 스파이크 갑옷
    dc.fillStyle = '#222';
    dc.beginPath(); dc.moveTo(screenX - halfW*0.65, spriteTop + spriteH*0.38); dc.lineTo(screenX - halfW*1.0, spriteTop + spriteH*0.25); dc.lineTo(screenX - halfW*0.45, spriteTop + spriteH*0.28); dc.fill();
    dc.beginPath(); dc.moveTo(screenX + halfW*0.65, spriteTop + spriteH*0.38); dc.lineTo(screenX + halfW*1.0, spriteTop + spriteH*0.25); dc.lineTo(screenX + halfW*0.45, spriteTop + spriteH*0.28); dc.fill();

    // 팔 (근육질)
    dc.fillStyle = skinC;
    dc.fillRect(screenX - halfW*0.9, spriteTop + spriteH*0.4 + walkAnim, halfW*0.3, spriteH*0.25);
    dc.fillRect(screenX + halfW*0.6, spriteTop + spriteH*0.42 - walkAnim, halfW*0.3, spriteH*0.22);

    if (en._chargeTimer > 0) {
      dc.strokeStyle = `rgba(255,200,0,${en._chargeTimer})`;
      dc.lineWidth = 3; dc.strokeRect(screenX - halfW*0.85, spriteTop + spriteH*0.05, halfW*1.7, spriteH*0.9);
    }
    return;
  }

  //---/// 2. PHANTOM (팬텀) 렌더링 ///---
  if (en.isPhantom) {
    const walkAnim = en._codexStatic ? 0 : (en.frame === 0 ? spriteH*0.05 : -spriteH*0.05);
    const baseAlpha = en._invulnFrame > 0 ? 0.3 : 0.85;
    dc.globalAlpha = baseAlpha;
    const bodyC = hitAlpha > 0 ? `rgba(255,200,255,1)` : '#1a004a';
    
    // 망토 (아래가 거칠게 찢어진 형태)
    dc.fillStyle = bodyC;
    dc.beginPath();
    dc.moveTo(screenX - halfW*0.45, spriteTop + spriteH*0.38);
    dc.lineTo(screenX + halfW*0.45, spriteTop + spriteH*0.38);
    dc.lineTo(screenX + halfW*0.6, spriteTop + spriteH*0.9);
    for(let i=0; i<5; i++) { // 지그재그 하단
       dc.lineTo(screenX + halfW*0.6 - halfW*1.2*(i/5) - halfW*0.12, spriteTop + spriteH*(0.8 + Math.random()*0.15));
    }
    dc.lineTo(screenX - halfW*0.6, spriteTop + spriteH*0.9);
    dc.fill();

    // 후드 속 얼굴 (어두운 공간에 빛나는 눈)
    dc.fillStyle = '#0a001a';
    dc.fillRect(screenX - halfW*0.35, spriteTop + spriteH*0.08 + walkAnim*0.5, halfW*0.7, spriteH*0.3);
    dc.strokeStyle = '#331166'; dc.lineWidth = halfW*0.1; // 후드 테두리
    dc.strokeRect(screenX - halfW*0.35, spriteTop + spriteH*0.08 + walkAnim*0.5, halfW*0.7, spriteH*0.3);

    // 눈 (세로로 찢어진 형태)
    dc.fillStyle = hitAlpha > 0.5 ? '#fff' : '#cc66ff';
    dc.shadowColor = '#aa00ff'; dc.shadowBlur = 12;
    dc.fillRect(screenX - halfW*0.2, spriteTop + spriteH*0.15 + walkAnim*0.5, halfW*0.08, spriteH*0.12);
    dc.fillRect(screenX + halfW*0.12, spriteTop + spriteH*0.15 + walkAnim*0.5, halfW*0.08, spriteH*0.12);
    dc.shadowBlur = 0;

    // 가슴 코어 (에너지 덩어리)
    dc.fillStyle = '#aa00ff';
    dc.beginPath(); dc.arc(screenX, spriteTop + spriteH*0.5, halfW*0.2, 0, Math.PI*2); dc.fill();
    dc.fillStyle = '#fff';
    dc.beginPath(); dc.arc(screenX, spriteTop + spriteH*0.5, halfW*0.08, 0, Math.PI*2); dc.fill();

    dc.globalAlpha = 1.0;
    return;
  }

  //---/// 3. SCREAMER (스크리머) 렌더링 ///---
  if (en.isScreamer) {
    const walkAnim = en._codexStatic ? 0 : (en.frame === 0 ? spriteH*0.05 : -spriteH*0.05);
    const bodyC = hitAlpha > 0 ? `rgba(255,180,160,1)` : '#5a2200';
    const skinC = hitAlpha > 0 ? '#fff' : '#8a4020';

    // 다리 (역관절)
    dc.fillStyle = '#220a00';
    dc.beginPath(); dc.moveTo(screenX - halfW*0.28, spriteTop + spriteH*0.75 + walkAnim); dc.lineTo(screenX - halfW*0.4, spriteTop + spriteH*0.9 + walkAnim); dc.lineTo(screenX - halfW*0.1, spriteTop + spriteH*1.0 + walkAnim); dc.fill();
    dc.beginPath(); dc.moveTo(screenX + halfW*0.28, spriteTop + spriteH*0.75 - walkAnim); dc.lineTo(screenX + halfW*0.4, spriteTop + spriteH*0.9 - walkAnim); dc.lineTo(screenX + halfW*0.1, spriteTop + spriteH*1.0 - walkAnim); dc.fill();

    // 몸통 (굽은 등)
    dc.fillStyle = bodyC;
    dc.beginPath(); dc.arc(screenX, spriteTop + spriteH*0.55, halfW*0.6, 0, Math.PI*2); dc.fill();

    // 머리
    dc.fillStyle = skinC;
    dc.fillRect(screenX - halfW*0.4, spriteTop + spriteH*0.1 + walkAnim*0.4, halfW*0.8, spriteH*0.35);
    drawShading(screenX - halfW*0.4, spriteTop + spriteH*0.1 + walkAnim*0.4, halfW*0.8, spriteH*0.35);

    // 뿔 4개
    dc.fillStyle = '#1a0000';
    const hy = spriteTop + spriteH*0.1 + walkAnim*0.4;
    dc.beginPath(); dc.moveTo(screenX - halfW*0.2, hy); dc.lineTo(screenX - halfW*0.5, hy - spriteH*0.15); dc.lineTo(screenX - halfW*0.05, hy + spriteH*0.05); dc.fill();
    dc.beginPath(); dc.moveTo(screenX + halfW*0.2, hy); dc.lineTo(screenX + halfW*0.5, hy - spriteH*0.15); dc.lineTo(screenX + halfW*0.05, hy + spriteH*0.05); dc.fill();

    // 거대한 입 & 이빨
    dc.fillStyle = '#000';
    const mouthOpen = en._summonWave > 0 ? spriteH*0.15 : spriteH*0.05; 
    dc.fillRect(screenX - halfW*0.25, spriteTop + spriteH*0.3 + walkAnim*0.4, halfW*0.5, mouthOpen);
    dc.fillStyle = '#ddd';
    for(let i=0; i<4; i++) {
       dc.fillRect(screenX - halfW*0.2 + i*halfW*0.12, spriteTop + spriteH*0.3 + walkAnim*0.4, halfW*0.05, spriteH*0.03);
       if (en._summonWave > 0) dc.fillRect(screenX - halfW*0.2 + i*halfW*0.12, spriteTop + spriteH*0.3 + mouthOpen - spriteH*0.03 + walkAnim*0.4, halfW*0.05, spriteH*0.03);
    }

    // 여러 개의 눈
    dc.fillStyle = hitAlpha > 0.5 ? '#fff' : '#ff8800';
    dc.fillRect(screenX - halfW*0.25, spriteTop + spriteH*0.18 + walkAnim*0.4, halfW*0.1, spriteH*0.05);
    dc.fillRect(screenX + halfW*0.15, spriteTop + spriteH*0.18 + walkAnim*0.4, halfW*0.1, spriteH*0.05);
    dc.fillRect(screenX - halfW*0.1,  spriteTop + spriteH*0.15 + walkAnim*0.4, halfW*0.08, spriteH*0.04);
    dc.fillRect(screenX + halfW*0.02, spriteTop + spriteH*0.15 + walkAnim*0.4, halfW*0.08, spriteH*0.04);

    if (en._summonWave > 0) {
      dc.strokeStyle = `rgba(255,200,0,${en._summonWave * 0.8})`;
      dc.lineWidth = 4;
      dc.beginPath(); dc.arc(screenX, spriteTop + spriteH*0.35, halfW * (2.5 - en._summonWave * 1.5), 0, Math.PI*2); dc.stroke();
    }

    // 길고 얇은 팔
    dc.fillStyle = skinC;
    dc.fillRect(screenX - halfW*0.7, spriteTop + spriteH*0.42 + walkAnim, halfW*0.15, spriteH*0.35);
    dc.fillRect(screenX + halfW*0.55, spriteTop + spriteH*0.45 - walkAnim, halfW*0.15, spriteH*0.35);
    return;
  }

  //---/// 4. SIEGE GUNNER 렌더링 ///---
  if (en.isSiege) {
    const floatY = en._codexStatic ? 0 : Math.sin(Date.now() / 200 + en.x) * spriteH * 0.08;
    const bodyC = hitAlpha > 0 ? `rgba(255,180,150,1)` : '#3a1500';
    const skinC = hitAlpha > 0 ? '#fff' : '#c06030';
    
    // 다리 대신 반중력 호버 파츠
    dc.fillStyle = '#111';
    dc.beginPath(); dc.moveTo(screenX - halfW*0.3, spriteTop + floatY + spriteH*0.8); dc.lineTo(screenX + halfW*0.3, spriteTop + floatY + spriteH*0.8); dc.lineTo(screenX, spriteTop + floatY + spriteH*1.0); dc.fill();
    dc.fillStyle = '#0ff'; // 호버 불빛
    dc.fillRect(screenX - halfW*0.1, spriteTop + floatY + spriteH*0.95, halfW*0.2, spriteH*0.05);

    // 로봇 같은 몸통 아머
    dc.fillStyle = '#222';
    dc.fillRect(screenX - halfW*0.45, spriteTop + floatY + spriteH*0.35, halfW*0.9, spriteH*0.5);
    drawShading(screenX - halfW*0.45, spriteTop + floatY + spriteH*0.35, halfW*0.9, spriteH*0.5);
    // 중앙 코어 라인
    dc.fillStyle = '#ff6600';
    dc.fillRect(screenX - halfW*0.05, spriteTop + floatY + spriteH*0.4, halfW*0.1, spriteH*0.4);

    // 머리 & 택티컬 헬멧
    dc.fillStyle = skinC;
    dc.fillRect(screenX - halfW*0.25, spriteTop + floatY + spriteH*0.15, halfW*0.5, spriteH*0.25);
    dc.fillStyle = '#0a0a0a'; 
    dc.fillRect(screenX - halfW*0.3, spriteTop + floatY + spriteH*0.1, halfW*0.6, spriteH*0.15);
    // 사이클롭스 단일 바이저
    dc.fillStyle = hitAlpha > 0.5 ? '#fff' : '#ff6600';
    dc.fillRect(screenX - halfW*0.2, spriteTop + floatY + spriteH*0.2, halfW*0.4, spriteH*0.06);

    // 거대한 어깨 포신 (Cannon)
    const isCharging = en.chargeTime && en.chargeTime > 0;
    const cannonY = spriteTop + floatY + spriteH*0.3 - (isCharging ? spriteH*0.05 : 0);
    dc.fillStyle = '#1a1a1a';
    dc.fillRect(screenX + halfW*0.3, cannonY, halfW*0.5, spriteH*0.35); 
    dc.fillStyle = '#333';
    dc.fillRect(screenX + halfW*0.35, cannonY - spriteH*0.05, halfW*0.4, spriteH*0.05);
    
    // 포구 이펙트
    const orbR = halfW*0.25 + (isCharging ? halfW*0.15 : 0);
    dc.fillStyle = `rgba(255,100,0,${en._codexStatic ? 0.8 : 0.8 + 0.2*Math.sin(Date.now()/120)})`;
    dc.beginPath(); dc.arc(screenX + halfW*0.55, cannonY + spriteH*0.15, orbR, 0, Math.PI*2); dc.fill();
    dc.fillStyle = '#fff'; dc.beginPath(); dc.arc(screenX + halfW*0.55, cannonY + spriteH*0.15, orbR*0.4, 0, Math.PI*2); dc.fill();

    // 조준선 레이저
    if (en._laserAlpha > 0) {
      dc.save();
      dc.strokeStyle = `rgba(255,80,0,${en._laserAlpha * 0.8})`;
      dc.lineWidth = 3;
      const barrelLen = halfW * 2.0;
      dc.beginPath(); dc.moveTo(screenX + halfW*0.55, cannonY + spriteH*0.15);
      dc.lineTo(screenX + halfW*0.55 + Math.cos(en._aimAngle)*barrelLen, cannonY + spriteH*0.15 + Math.sin(en._aimAngle)*barrelLen*0.4);
      dc.stroke();
      dc.restore();
    }
    return;
  }

  //---/// 5. IRONCLAD 렌더링 ///---
  if (en.isIronclad) {
    const walkAnim = en._codexStatic ? 0 : (en.frame === 0 ? spriteH*0.04 : -spriteH*0.04);
    const armorFrac = en.armor > 0 ? (en.armor / en.maxArmor) : 0;
    const bodyC = hitAlpha > 0 ? `rgba(255,170,170,1)` : (en._enraged ? '#7a0000' : '#4a3a2a');
    const skinC = hitAlpha > 0 ? '#fff' : '#6a5040';
    
    // 다리 (중장갑 부츠)
    dc.fillStyle = '#222';
    dc.fillRect(screenX - halfW*0.4, spriteTop + spriteH*0.85 + walkAnim, halfW*0.3, spriteH*0.15);
    dc.fillRect(screenX + halfW*0.1, spriteTop + spriteH*0.85 - walkAnim, halfW*0.3, spriteH*0.15);
    dc.fillStyle = '#555'; // 무릎 보호대
    dc.fillRect(screenX - halfW*0.4, spriteTop + spriteH*0.8 + walkAnim, halfW*0.3, spriteH*0.08);
    dc.fillRect(screenX + halfW*0.1, spriteTop + spriteH*0.8 - walkAnim, halfW*0.3, spriteH*0.08);

    // 몸통 내부
    dc.fillStyle = bodyC;
    dc.fillRect(screenX - halfW*0.5, spriteTop + spriteH*0.38, halfW*1.0, spriteH*0.5);

    // 금속 아머 판 (강조된 렌더링)
    if (armorFrac > 0) {
      const armorBright = Math.floor(100 + armorFrac * 60);
      dc.fillStyle = `rgb(${armorBright}, ${armorBright+10}, ${armorBright+20})`;
      dc.fillRect(screenX - halfW*0.6, spriteTop + spriteH*0.35, halfW*1.2, spriteH*0.45);
      drawShading(screenX - halfW*0.6, spriteTop + spriteH*0.35, halfW*1.2, spriteH*0.45);
      
      dc.fillStyle = `rgb(${armorBright-30}, ${armorBright-20}, ${armorBright-10})`;
      dc.fillRect(screenX - halfW*0.4, spriteTop + spriteH*0.8, halfW*0.8, spriteH*0.1); // 복부 장갑
      
      // 리벳 (나사)
      dc.fillStyle = '#111';
      for(let rx of [-0.5, 0.5]) {
        for(let ry of [0.4, 0.7]) {
          dc.fillRect(screenX + halfW*rx - halfW*0.05, spriteTop + spriteH*ry, halfW*0.1, halfW*0.1);
        }
      }
      // 균열 (데미지에 비례)
      if (armorFrac < 0.7) {
        dc.strokeStyle = `rgba(0,0,0,${(0.7-armorFrac)/0.7})`; dc.lineWidth = 2.5;
        dc.beginPath(); dc.moveTo(screenX - halfW*0.2, spriteTop + spriteH*0.4); dc.lineTo(screenX + halfW*0.1, spriteTop + spriteH*0.65); dc.lineTo(screenX - halfW*0.1, spriteTop + spriteH*0.75); dc.stroke();
      }
    }

    // 머리 (방독면/중장갑 헬멧 형태)
    dc.fillStyle = skinC;
    dc.fillRect(screenX - halfW*0.35, spriteTop + spriteH*0.1 + walkAnim*0.3, halfW*0.7, spriteH*0.25);
    if (armorFrac > 0) {
      dc.fillStyle = '#445'; // 헬멧
      dc.beginPath(); dc.arc(screenX, spriteTop + spriteH*0.2 + walkAnim*0.3, halfW*0.4, Math.PI, 0); dc.fill();
    }
    
    // 눈
    dc.fillStyle = en._enraged ? '#ffffff' : (hitAlpha > 0.5 ? '#fff' : '#ff2200');
    if (en._enraged) { dc.shadowColor = '#ff0000'; dc.shadowBlur = 15; }
    dc.beginPath(); dc.arc(screenX - halfW*0.15, spriteTop + spriteH*0.22 + walkAnim*0.3, halfW*0.08, 0, Math.PI*2); dc.fill();
    dc.beginPath(); dc.arc(screenX + halfW*0.15, spriteTop + spriteH*0.22 + walkAnim*0.3, halfW*0.08, 0, Math.PI*2); dc.fill();
    dc.shadowBlur = 0;

    // 건틀렛
    dc.fillStyle = armorFrac > 0 ? '#667' : skinC;
    dc.fillRect(screenX - halfW*0.8, spriteTop + spriteH*0.42 + walkAnim, halfW*0.3, spriteH*0.3);
    dc.fillRect(screenX + halfW*0.5, spriteTop + spriteH*0.44 - walkAnim, halfW*0.3, spriteH*0.25);
    return;
  }

  //---/// 6. 일반 적군 (Shooter & Melee) 렌더링 ///---
  {
    const isShooter = en.isShooter;
    const floatY = (isShooter && !en._codexStatic) ? Math.sin(Date.now() / 200 + en.x) * spriteH * 0.08 : 0;
    const walkAnim = (isShooter || en._codexStatic) ? 0 : (en.frame === 0 ? spriteH*0.05 : -spriteH*0.05);

    const bodyC = hitAlpha > 0 ? `rgba(255,180,180,1)` : (isShooter ? '#2a1a4a' : '#4a5a3a');
    const skinC = hitAlpha > 0 ? `rgba(255,255,255,1)` : (isShooter ? '#e0d0f0' : '#6a8a4a');
    const eyeC  = hitAlpha > 0.5 ? '#fff' : (isShooter ? '#c080ff' : '#ff0000');

    // 다리 (Shooter는 뾰족한 역삼각, Melee는 전투화)
    if (isShooter) {
       dc.fillStyle = '#111';
       dc.beginPath(); dc.moveTo(screenX - halfW*0.2, spriteTop + floatY + spriteH*0.8); dc.lineTo(screenX + halfW*0.2, spriteTop + floatY + spriteH*0.8); dc.lineTo(screenX, spriteTop + floatY + spriteH*1.0); dc.fill();
    } else {
       dc.fillStyle = '#222'; 
       dc.fillRect(screenX - halfW*0.35, spriteTop + spriteH*0.85 + walkAnim, halfW*0.25, spriteH*0.15);
       dc.fillRect(screenX + halfW*0.1,  spriteTop + spriteH*0.85 - walkAnim, halfW*0.25, spriteH*0.15);
    }

    // 몸통 (군복/수트)
    dc.fillStyle = bodyC;
    if (isShooter) {
      dc.beginPath(); dc.moveTo(screenX - halfW*0.3, spriteTop + floatY + spriteH*0.4); dc.lineTo(screenX + halfW*0.3, spriteTop + floatY + spriteH*0.4); dc.lineTo(screenX + halfW*0.5, spriteTop + floatY + spriteH*0.8); dc.lineTo(screenX - halfW*0.5, spriteTop + floatY + spriteH*0.8); dc.fill();
    } else {
      dc.fillRect(screenX - halfW*0.45, spriteTop + spriteH*0.4, halfW*0.9, spriteH*0.45);
      drawShading(screenX - halfW*0.45, spriteTop + spriteH*0.4, halfW*0.9, spriteH*0.45);
      
      // 택티컬 벨트 및 하네스 (Melee 전용)
      dc.fillStyle = '#222';
      dc.fillRect(screenX - halfW*0.45, spriteTop + spriteH*0.75, halfW*0.9, spriteH*0.08); // 허리띠
      dc.fillRect(screenX - halfW*0.2, spriteTop + spriteH*0.4, halfW*0.1, spriteH*0.35); // 어깨끈
      dc.fillRect(screenX + halfW*0.1, spriteTop + spriteH*0.4, halfW*0.1, spriteH*0.35);
      dc.fillStyle = '#888'; // 은색 버클
      dc.fillRect(screenX - halfW*0.1, spriteTop + spriteH*0.75, halfW*0.2, spriteH*0.08);
    }

    // 머리 & 헬멧
    const headY = spriteTop + floatY + spriteH*0.1 + walkAnim*0.5;
    dc.fillStyle = skinC;
    dc.fillRect(screenX - halfW*0.3, headY, halfW*0.6, spriteH*0.28);
    dc.fillStyle = '#1a1a1a'; // 헬멧
    dc.fillRect(screenX - halfW*0.35, headY - spriteH*0.02, halfW*0.7, spriteH*0.12);
    
    // 눈/바이저
    dc.fillStyle = eyeC;
    if (isShooter) {
      // 가로로 긴 사이버 바이저
      dc.shadowColor = eyeC; dc.shadowBlur = 8;
      dc.fillRect(screenX - halfW*0.2, headY + spriteH*0.12, halfW*0.4, spriteH*0.05);
      dc.shadowBlur = 0;
      // 가슴 코어
      const isCharging = en.chargeTime && en.chargeTime > 0;
      const orbR = halfW*0.15 + (isCharging ? halfW*0.1 : 0);
      dc.fillStyle = `rgba(180,80,255,${en._codexStatic ? 0.7 : 0.7 + 0.3 * Math.sin(Date.now()/150)})`;
      dc.beginPath(); dc.arc(screenX, spriteTop + floatY + spriteH*0.45, orbR, 0, Math.PI*2); dc.fill();
    } else {
      // 양쪽 빛나는 고글 눈
      const eyeOff = en.frame === 0 ? -halfW*0.04 : halfW*0.04; // 고개 돌리는 느낌
      dc.fillRect(screenX - halfW*0.18 + eyeOff, headY + spriteH*0.12, halfW*0.12, spriteH*0.06);

function renderLightningLines() {
  if (lightningLines.length === 0) return;

  const BOLT_PALETTE = [
    { glow: '#ffffff', core: '#e8f0ff' }, // white
    { glow: '#aa44ff', core: '#ddb0ff' }, // purple
    { glow: '#2288ff', core: '#aad4ff' }, // blue
  ];

  // --- [최적화] 좌표부터 싹 다 미리 계산해서 모아두기 ---
  const activeBolts = [];
  
  lightningLines.forEach(l => {
    function project(wx, wy) {
      const dx = wx - player.x, dy = wy - player.y;
      let sa = Math.atan2(dy, dx) - player.angle;
      while (sa >  Math.PI) sa -= Math.PI * 2;
      while (sa < -Math.PI) sa += Math.PI * 2;
      if (Math.abs(sa) > HALF_FOV + 0.3) return null;
      const dist = Math.hypot(dx, dy);
      if (dist < 0.1) return null;
      const sx = Math.floor(((sa / FOV) + 0.5) * SCREEN_W);
      const sy = Math.floor(SCREEN_H * 0.5);
      return { sx, sy };
    }
    const p1 = project(l.x1, l.y1);
    const p2 = project(l.x2, l.y2);
    if (!p1 || !p2) return;
    
    const alpha = Math.max(0, l.life / 0.3);
    const SEG = 6;
    const pts = [p1];
    const perpX = -(p2.sy - p1.sy), perpY = p2.sx - p1.sx;
    const perpLen = Math.hypot(perpX, perpY) || 1;
    const colorOffset = Math.floor(Math.random() * BOLT_PALETTE.length);
    
    for (let i = 1; i < SEG; i++) {
      const t = i / SEG;
      const bx = p1.sx + (p2.sx - p1.sx) * t;
      const by = p1.sy + (p2.sy - p1.sy) * t;
      const jitter = (Math.random() - 0.5) * 28;
      pts.push({ sx: bx + (perpX / perpLen) * jitter, sy: by + (perpY / perpLen) * jitter });
    }
    pts.push(p2);
    activeBolts.push({ pts, alpha, colorOffset });
  });

  if (activeBolts.length === 0) return;

  // --- [최적화] shadowBlur 전환을 단 3번만 하도록 레이어별로 일괄 렌더링 ---
  ctx.save();
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';

  // 레이어 1: 넓은 외곽 글로우 (제일 무거운 연산)
  ctx.shadowBlur = 22;
  ctx.lineWidth = 5.2;
  activeBolts.forEach(bolt => {
    ctx.globalAlpha = bolt.alpha * 0.45;
    for (let i = 0; i < bolt.pts.length - 1; i++) {
      const c = BOLT_PALETTE[(bolt.colorOffset + i) % BOLT_PALETTE.length];
      ctx.shadowColor = c.glow; ctx.strokeStyle = c.glow;
      ctx.beginPath(); ctx.moveTo(bolt.pts[i].sx, bolt.pts[i].sy); ctx.lineTo(bolt.pts[i+1].sx, bolt.pts[i+1].sy); ctx.stroke();
    }
  });

  // 레이어 2: 중간 글로우
  ctx.shadowBlur = 10;
  ctx.lineWidth = 3.25;
  activeBolts.forEach(bolt => {
    ctx.globalAlpha = bolt.alpha * 0.85;
    for (let i = 0; i < bolt.pts.length - 1; i++) {
      const c = BOLT_PALETTE[(bolt.colorOffset + i) % BOLT_PALETTE.length];
      ctx.shadowColor = c.glow; ctx.strokeStyle = c.glow;
      ctx.beginPath(); ctx.moveTo(bolt.pts[i].sx, bolt.pts[i].sy); ctx.lineTo(bolt.pts[i+1].sx, bolt.pts[i+1].sy); ctx.stroke();
    }
  });

  // 레이어 3: 코어 (블러 끄기)
  ctx.shadowBlur = 0;
  ctx.lineWidth = 1.3;
  activeBolts.forEach(bolt => {
    ctx.globalAlpha = bolt.alpha;
    for (let i = 0; i < bolt.pts.length - 1; i++) {
      const c = BOLT_PALETTE[(bolt.colorOffset + i) % BOLT_PALETTE.length];
      ctx.strokeStyle = c.core;
      ctx.beginPath(); ctx.moveTo(bolt.pts[i].sx, bolt.pts[i].sy); ctx.lineTo(bolt.pts[i+1].sx, bolt.pts[i+1].sy); ctx.stroke();
    }
  });

  ctx.restore();
}
function renderExplosionFX(zBuffer) {
  if (explosionFX.length === 0) return;
  
  // 거리에 따라 정렬 (멀리 있는 폭발부터 먼저 그리도록)
  const sortedFX = [...explosionFX].map(fx => {
    return { fx, dist: Math.hypot(fx.x - player.x, fx.y - player.y) };
  }).sort((a, b) => b.dist - a.dist);

  sortedFX.forEach(({ fx, dist }) => {
    const dx = fx.x - player.x, dy = fx.y - player.y;
    let sa = Math.atan2(dy, dx) - player.angle;
    while (sa >  Math.PI) sa -= Math.PI * 2;
    while (sa < -Math.PI) sa += Math.PI * 2;
    
    if (Math.abs(sa) > HALF_FOV + 0.8) return; 
    if (dist < 0.1) return;
    
    const corrected = dist * Math.cos(sa);
    const screenX = Math.floor(((sa / FOV) + 0.5) * SCREEN_W);
    const screenR = Math.floor((SCREEN_H / corrected) * fx.r * 0.5);
    if (screenR < 2) return;

    const baseAlpha = Math.max(0, fx.life) * 0.9;
    const halfW = screenR * 1.5; // 클리핑 범위 (충격파 고려)

    ctx.save();
    
    //---/// Z-Buffer 클리핑 (벽 뒤에 있는 폭발은 가려지게 처리) ///---
    ctx.beginPath();
    let visible = false;
    let startX = -1;
    const startPx = Math.max(0, screenX - halfW);
    const endPx = Math.min(SCREEN_W, screenX + halfW);
    for (let px = startPx; px <= endPx; px++) {
      const ri = Math.min(NUM_RAYS - 1, Math.max(0, Math.round(px * NUM_RAYS / SCREEN_W)));
      const isVis = (px < SCREEN_W && corrected < zBuffer[ri]);
      
      if (isVis) {
        if (startX === -1) startX = px;
        visible = true;
      } else {
        if (startX !== -1) {
          ctx.rect(startX, 0, px - startX, SCREEN_H);
          startX = -1;
        }
      }
    }

    // ==========================================
    // [버그 수정] 루프가 끝난 뒤 남은 사각형 마저 그리기
    if (startX !== -1) {
      ctx.rect(startX, 0, endPx + 1 - startX, SCREEN_H);
    }
    // ==========================================

    if (!visible) { ctx.restore(); return; }
    ctx.clip();
    
    //---/// 폭발 렌더링 (스크린 블렌딩으로 빛이 화사하게 겹치게) ///---
    ctx.globalCompositeOperation = 'screen';
    const centerY = Math.floor(SCREEN_H * 0.5);

    // 1. 메인 폭발 구체 (그라데이션)
    ctx.beginPath();
    ctx.arc(screenX, centerY, screenR, 0, Math.PI * 2);
    const mainGrad = ctx.createRadialGradient(screenX, centerY, 0, screenX, centerY, screenR);
    mainGrad.addColorStop(0, `${fx.color}${baseAlpha})`);
    mainGrad.addColorStop(0.5, `${fx.color}${baseAlpha * 0.6})`);
    mainGrad.addColorStop(1, `${fx.color}0)`);
    ctx.fillStyle = mainGrad;
    ctx.fill();

    // 2. 코어 섬광 (매우 밝은 중앙 빛, 터지는 직후에만 팝업)
    if (fx.life > 0.6) {
      const coreAlpha = (fx.life - 0.6) / 0.4 * baseAlpha;
      ctx.beginPath();
      ctx.arc(screenX, centerY, screenR * 0.5, 0, Math.PI * 2);
      const coreGrad = ctx.createRadialGradient(screenX, centerY, 0, screenX, centerY, screenR * 0.5);
      coreGrad.addColorStop(0, `rgba(255, 255, 255, ${coreAlpha})`);
      coreGrad.addColorStop(1, `rgba(255, 255, 255, 0)`);
      ctx.fillStyle = coreGrad;
      ctx.fill();
    }

    // 3. 충격파 링 (바닥으로 퍼지는 타원 형태)
    ctx.beginPath();
    if (ctx.ellipse) {
      ctx.ellipse(screenX, centerY + screenR * 0.2, screenR * 1.3, screenR * 0.4, 0, 0, Math.PI * 2);
    } else {
      ctx.arc(screenX, centerY, screenR * 1.2, 0, Math.PI * 2);
    }
    ctx.strokeStyle = `${fx.color}${baseAlpha * 0.8})`;
    ctx.lineWidth = Math.max(2, screenR * 0.15 * fx.life);
    ctx.stroke();

    ctx.restore();
  });
}

let _screenImgData = null; // 최적화: 전역 이미지 버퍼 재사용
const _zBuffer = new Float32Array(NUM_RAYS); // 전역 1회 할당으로 GC 방지
let _cachedBgData = null; // --- [최적화 5단계] 배경 그라데이션 캐싱 배열 ---

function castRays(bobY) {
  if (!_screenImgData) {
    _screenImgData = ctx.createImageData(SCREEN_W, SCREEN_H);
    
    // --- [최적화 5단계] 94만 픽셀짜리 천장/바닥을 최초 1회만 연산하여 메모리에 구워버립니다 ---
    _cachedBgData = new Uint8ClampedArray(SCREEN_W * SCREEN_H * 4);
    for (let y = 0; y < SCREEN_H; y++) {
      let r, g, b;
      if (y < SCREEN_H / 2) {
        const t = y / (SCREEN_H / 2);
        r = Math.floor(4 + t * 6); g = Math.floor(5 + t * 7); b = Math.floor(8 + t * 12);
      } else {
        const t = (y - SCREEN_H / 2) / (SCREEN_H / 2); r = Math.floor(26 + t*16); g = Math.floor(t*4); b = 0;
      }
      for (let x = 0; x < SCREEN_W; x++) { 
        const i = (y * SCREEN_W + x) * 4; 
        _cachedBgData[i] = r; _cachedBgData[i+1] = g; _cachedBgData[i+2] = b; _cachedBgData[i+3] = 255; 
      }
    }
  }
  
  const imgData = _screenImgData; 
  const data = imgData.data; 
  const zBuffer = _zBuffer;

  // --- [최적화 5단계] 매 프레임 돌던 이중 루프 대신, C언어급 속도의 메모리 복사 단 1줄로 덮어쓰기! ---
  data.set(_cachedBgData);

  const pCos = Math.cos(player.angle);
  const pSin = Math.sin(player.angle);

  for (let ray = 0; ray < NUM_RAYS; ray++) {
    const rayAngle = player.angle + RAY_ANGLES[ray];
    
    // --- [최적화 6단계] 삼각함수 덧셈정리를 활용하여 고비용 Math.cos/sin 완전 제거! ---
    // cos(a+b) = cos(a)cos(b) - sin(a)sin(b)
    const cosA = pCos * RAY_COS[ray] - pSin * RAY_SIN[ray];
    const sinA = pSin * RAY_COS[ray] + pCos * RAY_SIN[ray];
    
    let mapX = Math.floor(player.x), mapY = Math.floor(player.y);
    const deltaX = Math.abs(1/(cosA||1e-5)), deltaY = Math.abs(1/(sinA||1e-5));
    let stepX, stepY, sideDistX, sideDistY;
    if (cosA < 0) { stepX=-1; sideDistX=(player.x-mapX)*deltaX; } else { stepX= 1; sideDistX=(mapX+1-player.x)*deltaX; }
    if (sinA < 0) { stepY=-1; sideDistY=(player.y-mapY)*deltaY; } else { stepY= 1; sideDistY=(mapY+1-player.y)*deltaY; }
    let wallType=1, side=0, hit=false;
    for (let step=0; step < MAX_DEPTH*8 && !hit; step++) {
      if (sideDistX < sideDistY) { sideDistX+=deltaX; mapX+=stepX; side=0; } else { sideDistY+=deltaY; mapY+=stepY; side=1; }
      if (mapX<0||mapY<0||mapX>=MAP_W||mapY>=MAP_H) { hit=true; break; }
      if (currentMap[mapY][mapX]) { wallType=currentMap[mapY][mapX]; hit=true; }
    }
    let dist = side===0 ? (mapX - player.x + (1-stepX)/2) / cosA : (mapY - player.y + (1-stepY)/2) / sinA;
          dist = Math.max(0.1, dist); zBuffer[ray] = dist;
          const corrected = dist * Math.cos(rayAngle - player.angle);
          const wallH = Math.floor((SCREEN_H/corrected)*WALL_SCALE);
          const wallTop = Math.max(0, Math.floor((SCREEN_H-wallH)/2 + bobY)); const wallBottom = Math.min(SCREEN_H, wallTop+wallH);
          
          // [수정됨] 텍스처 픽셀 매핑 로직
          const fog = Math.max(0, 1-dist/MAX_DEPTH);
          const screenX0 = Math.round(ray * SCREEN_W / NUM_RAYS); 
          const screenX1 = Math.round((ray + 1) * SCREEN_W / NUM_RAYS);
          
          const texData = wallTextures[wallType] || wallTextures[1];
          
          // 벽의 정확한 X 타격점 계산 (텍스처의 가로 좌표 0~63 추출)
          let exactHit;
          if (side === 0) exactHit = player.y + dist * sinA;
          else            exactHit = player.x + dist * cosA;
          exactHit -= Math.floor(exactHit); 
          let texX = Math.floor(exactHit * 64);
          // 방향에 따라 텍스처가 뒤집혀 보이지 않도록 보정
          if (side === 0 && cosA > 0) texX = 63 - texX; 
          if (side === 1 && sinA < 0) texX = 63 - texX;
          
          const texStep = 64.0 / wallH;
          // 화면 밖으로 잘린 천장 부분만큼 텍스처의 시작 Y 좌표를 내려줌
          let texPos = (wallTop - ((SCREEN_H - wallH) / 2 + bobY)) * texStep;

          for (let y = wallTop; y < wallBottom; y++) {
            let texY = Math.floor(texPos) & 63; // 비트연산으로 0~63 제한
            texPos += texStep;
            
            // 텍스처 배열에서 R, G, B 뽑아오기
            const texIdx = (texY * 64 + texX) * 4;
            let tr = texData[texIdx];
            let tg = texData[texIdx+1];
            let tb = texData[texIdx+2];
            
            // 빛을 받지 않는 벽면(side === 1)은 살짝 어둡게 처리
            if (side === 1) { 
              tr = Math.floor(tr * 0.65); tg = Math.floor(tg * 0.65); tb = Math.floor(tb * 0.65); 
            }
            
            // 안개(거리 음영) 적용
            const fr = Math.floor(tr * fog), fg2 = Math.floor(tg * fog), fb = Math.floor(tb * fog);
            
            // [최적화] 행 시작 인덱스를 미리 계산해 px 루프 내 곱셈 횟수 감소
            const rowBase = (y * SCREEN_W + screenX0) * 4;
            for (let px = screenX0; px < screenX1; px++) {
              const i = rowBase + (px - screenX0) * 4; 
              data[i] = fr; data[i+1] = fg2; data[i+2] = fb; data[i+3] = 255;
            }
          }
  }
  ctx.putImageData(imgData, 0, 0); return zBuffer;
}

const _spritesPool = [];

function addSpriteToPool(type, obj, dist) {
  if (_spriteCount >= _spritesPool.length) {
    _spritesPool.push({ type: type, obj: obj, dist: dist });
  }
  const s = _spritesPool[_spriteCount++];
  s.type = type; s.obj = obj; s.dist = dist;
}

  _soulEnemyMap.clear();

  enemies.forEach(en => addSpriteToPool('enemy', en, Math.hypot(en.x-player.x, en.y-player.y)));
